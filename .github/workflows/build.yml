name: NTECH Final Fix Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Project Structure
        run: |
          mkdir -p app/src/main/java/com/ntech/cdi/ui
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Create Settings & Properties
        run: |
          echo "include ':app'" > settings.gradle
          echo "rootProject.name = 'NtechCDI'" >> settings.gradle
          
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Create Root Build Gradle
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } }
          }
          EOF

      - name: Create App Build Gradle
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.ntech.cdi'
              compileSdk 34
              defaultConfig {
                  applicationId "com.ntech.cdi"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'com.github.PhilJay:MPAndroidChart:v3.1.0'
          }
          EOF

      - name: Create Basic Resources
        run: |
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources><style name="Theme.NTECH" parent="Theme.AppCompat.Light.NoActionBar" /></resources>
          EOF
          
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="NTECH" android:theme="@style/Theme.NTECH">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create UI Files
        run: |
          cat > app/src/main/res/layout/act_main.xml << 'EOF'
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/container" android:layout_width="match_parent" android:layout_height="match_parent" />
          EOF
          
          cat > app/src/main/java/com/ntech/cdi/MainActivity.java << 'EOF'
          package com.ntech.cdi;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  setContentView(R.layout.act_main);
              }
          }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          chmod +x gradlew || gradle wrapper --gradle-version 8.4
          ./gradlew assembleDebug --no-daemon

      - name: Upload NTECH APK
        uses: actions/upload-artifact@v4
        with:
          name: NTECH-CDI-App
          path: app/build/outputs/apk/debug/app-debug.apk
