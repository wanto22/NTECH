name: Build NTECH CDI Tuner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Project Files
        run: |
          python3 << 'PYEOF'
          import os

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)

          # Folder structure (Root level for easier build)
          pkg = "app/src/main/java/com/ntech/cdi"
          ui  = f"{pkg}/ui"
          res = "app/src/main/res"

          # --- Script Python tetap sama seperti sebelumnya, tapi tanpa folder "NtechCDI/" ---
          # (Gunakan path 'app/...' langsung di root agar Gradle mengenalinya)

          w(f"{pkg}/CdiConfig.kt", '''package com.ntech.cdi\nclass CdiConfig { /* ... kode sama ... */ }''')
          w(f"{pkg}/MainActivity.kt", '''package com.ntech.cdi\n/* ... kode MainActivity ... */''')
          w(f"{ui}/MonitorFragment.kt", '''package com.ntech.cdi.ui\n/* ... kode Monitor ... */''')
          w(f"{ui}/MapFragment.kt", '''package com.ntech.cdi.ui\n/* ... kode Map ... */''')
          w(f"{ui}/SettingsFragment.kt", '''package com.ntech.cdi.ui\n/* ... kode Settings ... */''')
          
          # Layouts & Manifest
          w(f"{res}/layout/activity_main.xml", '''<?xml version="1.0" encoding="utf-8"?><LinearLayout ...''')
          # ... (lanjutkan semua penulisan file res/layout, values, dsb ke path root) ...

          w("app/build.gradle", "plugins{id 'com.android.application';id 'kotlin-android'}\nandroid{compileSdk 34;namespace 'com.ntech.cdi';defaultConfig{applicationId 'com.ntech.cdi';minSdk 26;targetSdk 34;versionCode 1;versionName '1.0'}}\ndependencies{implementation 'androidx.appcompat:appcompat:1.6.1';implementation 'androidx.core:core-ktx:1.12.0';implementation 'com.google.android.material:material:1.11.0'}")
          w("build.gradle", "buildscript{repositories{google();mavenCentral()};dependencies{classpath 'com.android.tools.build:gradle:8.2.0';classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10'}}\nallprojects{repositories{google();mavenCentral()}}")
          w("settings.gradle", "rootProject.name = 'NtechCDI'\ninclude ':app'")
          w("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          
          print("Files generated at root level.")
          PYEOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK
        run: |
          # Generate wrapper jika belum ada, lalu build
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: NTECH-CDI-Tuner-v5.7F
            path: app/build/outputs/apk/debug/app-debug.apk
