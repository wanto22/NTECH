name: Build NTECH CDI Tuner v5.7H APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Write Kotlin source files
        run: |
          python3 - << 'PYEOF'
          import os

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              open(path, 'w', encoding='utf-8').write(content)

          B   = "NtechCDI"
          PKG = B + "/app/src/main/java/com/ntech/cdi"
          UI  = PKG + "/ui"

          w(PKG + "/CdiConfig.kt", r"""package com.ntech.cdi

          class CdiConfig {
              val map1 = IntArray(32) { DEF_MAP1[it] }
              val map2 = IntArray(32) { DEF_MAP2[it] }
              val map3 = IntArray(32) { DEF_MAP3[it] }
              var rpmLimiter      = 12000
              var pulserAngleX10  = 630
              var scrPulse        = 1000
              var rumbleOnRpm     = 0      // rumble AKTIF di ATAS nilai ini
              var rumbleOffRpm    = 0      // rumble MATI di ATAS nilai ini
              var rumbleSkip      = 4
              var rumbleSpeed     = 1
              var activeMap       = 1
              var edge            = 0
              var lastRpm         = 0
              var rumbleActive    = false

              companion object {
                  val DEF_MAP1 = intArrayOf(5,8,15,20,24,28,30,32,34,34,34,34,34,34,34,34,34,34,34,34,34,32,30,27,23,19,17,15,15,15,10,10)
                  val DEF_MAP2 = intArrayOf(5,6,12,18,22,26,28,30,32,32,32,32,32,32,32,32,32,32,32,30,28,26,24,22,20,17,15,12,12,12,8,8)
                  val DEF_MAP3 = intArrayOf(5,5,12,18,24,30,34,36,38,40,40,40,40,40,38,36,34,32,30,28,26,24,22,20,18,15,12,10,10,10,8,8)
                  val RPM_STEPS = intArrayOf(500,1000,1500,2000,2500,3000,3500,4000,4500,5000,
                      5500,6000,6500,7000,7500,8000,8500,9000,9500,10000,
                      10500,11000,11500,12000,12500,13000,13500,14000,14500,15000,15500,16000)
                  fun tickToUs(tick: Int) = tick / 2
                  fun usToTick(us: Int)   = us * 2
                  fun angleStr(x10: Int): String {
                      val w = x10 / 10; val d = x10 % 10
                      return if (d == 0) "$w°" else "$w.$d°"
                  }
                  fun rpmLabel(i: Int) = if (i < RPM_STEPS.size) "${RPM_STEPS[i]}" else "-"
              }

              fun mapArray(m: Int) = when (m) { 2 -> map2; 3 -> map3; else -> map1 }
              fun activeMapArray() = mapArray(activeMap)

              fun getAdvForRpm(rpm: Int): Int {
                  if (rpm <= 0) return activeMapArray()[0]
                  val idx = ((rpm / 500) - 1).coerceIn(0, 31)
                  return activeMapArray()[idx]
              }

              fun parseLine(line: String): Boolean {
                  return when {
                      line.startsWith("RPM:") -> { lastRpm = line.removePrefix("RPM:").toIntOrNull() ?: lastRpm; false }
                      line.startsWith("ACT:") -> { activeMap = line.removePrefix("ACT:").toIntOrNull() ?: activeMap; false }
                      line.startsWith("RAS:") -> { rumbleActive = (line.removePrefix("RAS:").toIntOrNull()?:0)==1; false }
                      line == "OK" || line == "ERR" -> false
                      line.startsWith("LIM:") -> { rpmLimiter     = line.removePrefix("LIM:").toIntOrNull() ?: rpmLimiter;    true }
                      line.startsWith("ANG:") -> { pulserAngleX10 = line.removePrefix("ANG:").toIntOrNull() ?: pulserAngleX10; true }
                      line.startsWith("SCR:") -> { scrPulse       = line.removePrefix("SCR:").toIntOrNull() ?: scrPulse;      true }
                      line.startsWith("RON:") -> { rumbleOnRpm    = line.removePrefix("RON:").toIntOrNull() ?: rumbleOnRpm;   true }
                      line.startsWith("ROF:") -> { rumbleOffRpm   = line.removePrefix("ROF:").toIntOrNull() ?: rumbleOffRpm;  true }
                      line.startsWith("RSK:") -> { rumbleSkip     = line.removePrefix("RSK:").toIntOrNull() ?: rumbleSkip;    true }
                      line.startsWith("RSP:") -> { rumbleSpeed    = line.removePrefix("RSP:").toIntOrNull() ?: rumbleSpeed;   true }
                      line.startsWith("EDG:") -> { edge           = line.removePrefix("EDG:").toIntOrNull() ?: edge;          true }
                      line.startsWith("M1:") -> { line.removePrefix("M1:").split(",").forEachIndexed{i,v->if(i<32)map1[i]=v.trim().toIntOrNull()?.coerceIn(0,60)?:map1[i]}; true }
                      line.startsWith("M2:") -> { line.removePrefix("M2:").split(",").forEachIndexed{i,v->if(i<32)map2[i]=v.trim().toIntOrNull()?.coerceIn(0,60)?:map2[i]}; true }
                      line.startsWith("M3:") -> { line.removePrefix("M3:").split(",").forEachIndexed{i,v->if(i<32)map3[i]=v.trim().toIntOrNull()?.coerceIn(0,60)?:map3[i]}; true }
                      else -> false
                  }
              }

              fun buildMapCmd(prefix: String, arr: IntArray) = "$prefix:${arr.joinToString(",")}\r\n"
          }
          """)

          w(PKG + "/MainActivity.kt", r"""package com.ntech.cdi

          import android.Manifest; import android.annotation.SuppressLint
          import android.bluetooth.*; import android.graphics.BitmapFactory; import android.graphics.drawable.BitmapDrawable
          import android.net.Uri; import android.os.*; import android.widget.*
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AlertDialog; import androidx.appcompat.app.AppCompatActivity
          import com.ntech.cdi.ui.*; import java.io.*; import java.util.UUID

          class MainActivity : AppCompatActivity() {
              companion object {
                  var socket: BluetoothSocket?=null; var outStream: OutputStream?=null; var inStream: InputStream?=null
                  var isConnected=false; val config=CdiConfig()
                  private val callbacks=mutableMapOf<String,(String,Boolean)->Unit>()
                  fun registerCallback(tag:String,cb:(String,Boolean)->Unit){callbacks[tag]=cb}
                  fun unregisterCallback(tag:String){callbacks.remove(tag)}
                  fun dispatch(line:String,isCfg:Boolean){callbacks.values.forEach{it(line,isCfg)}}
              }
              private lateinit var tvStatus:TextView; private lateinit var btnConnect:TextView
              private lateinit var tvDevice:TextView; private lateinit var nav0:TextView
              private lateinit var nav1:TextView; private lateinit var nav2:TextView
              private val fragMonitor=MonitorFragment(); private val fragKurva=KurvaFragment(); private val fragSetting=SettingFragment()
              private var currentTab=-1
              private val reqBt=registerForActivityResult(ActivityResultContracts.RequestMultiplePermissions()){p->if(p.values.all{it})showBtDialog() else toast("Izin BT diperlukan")}
              private val pickBg=registerForActivityResult(ActivityResultContracts.GetContent()){uri->uri?.let{getSharedPreferences("ntech",MODE_PRIVATE).edit().putString("bg_uri",it.toString()).apply();applyBg(it.toString())}}
              override fun onCreate(s:Bundle?){
                  super.onCreate(s); setContentView(R.layout.activity_main)
                  tvStatus=findViewById(R.id.tvStatus); btnConnect=findViewById(R.id.btnConnect)
                  tvDevice=findViewById(R.id.tvDevice); nav0=findViewById(R.id.nav0); nav1=findViewById(R.id.nav1); nav2=findViewById(R.id.nav2)
                  getSharedPreferences("ntech",MODE_PRIVATE).getString("bg_uri",null)?.let{applyBg(it)}
                  btnConnect.setOnClickListener{if(isConnected)disconnect() else checkBt()}
                  nav0.setOnClickListener{showTab(0)}; nav1.setOnClickListener{showTab(1)}; nav2.setOnClickListener{showTab(2)}
                  val ft=supportFragmentManager.beginTransaction()
                  ft.add(R.id.fragContainer,fragMonitor,"mon"); ft.add(R.id.fragContainer,fragKurva,"kurva"); ft.add(R.id.fragContainer,fragSetting,"set")
                  ft.hide(fragMonitor).hide(fragKurva).hide(fragSetting).commit()
                  showTab(0); updateUI()
              }
              fun applyBg(u:String){try{val bmp=BitmapFactory.decodeStream(contentResolver.openInputStream(Uri.parse(u)));findViewById<android.widget.FrameLayout>(R.id.fragContainer).background=BitmapDrawable(resources,bmp)}catch(e:Exception){}}
              fun changeBg()=pickBg.launch("image/*")
              fun showTab(t:Int){
                  if(t==currentTab)return; currentTab=t
                  val ft=supportFragmentManager.beginTransaction(); ft.hide(fragMonitor).hide(fragKurva).hide(fragSetting)
                  when(t){0->ft.show(fragMonitor);1->ft.show(fragKurva);else->ft.show(fragSetting)}; ft.commit()
                  val on=0xFF00E5FF.toInt(); val off=0xFF8899AA.toInt()
                  nav0.setTextColor(if(t==0)on else off); nav1.setTextColor(if(t==1)on else off); nav2.setTextColor(if(t==2)on else off)
              }
              private fun checkBt(){if(Build.VERSION.SDK_INT>=31)reqBt.launch(arrayOf(Manifest.permission.BLUETOOTH_SCAN,Manifest.permission.BLUETOOTH_CONNECT)) else showBtDialog()}
              @SuppressLint("MissingPermission") private fun showBtDialog(){
                  val ba=BluetoothAdapter.getDefaultAdapter()?:run{toast("BT tidak tersedia");return}
                  if(!ba.isEnabled){toast("Aktifkan Bluetooth");return}
                  val p=ba.bondedDevices.toList(); if(p.isEmpty()){toast("Tidak ada perangkat HC-05");return}
                  AlertDialog.Builder(this).setTitle("Pilih HC-05").setItems(p.map{"${it.name}  ${it.address}"}.toTypedArray()){_,i->connectBt(p[i])}.show()
              }
              @SuppressLint("MissingPermission") private fun connectBt(dev:BluetoothDevice){
                  tvStatus.text="Menghubungkan..."; tvStatus.setTextColor(0xFFFFAA00.toInt())
                  Thread{try{val s=dev.createRfcommSocketToServiceRecord(UUID.fromString("00001101-0000-1000-8000-00805F9B34FB"))
                      s.connect();socket=s;outStream=s.outputStream;inStream=s.inputStream;isConnected=true
                      runOnUiThread{updateUI(dev.name)};startReading();Thread.sleep(400);sendCmd("GET\r\n")
                  }catch(e:Exception){isConnected=false;runOnUiThread{tvStatus.text="Gagal";tvStatus.setTextColor(0xFFFF5252.toInt());toast(e.message?:"Error")}}}.start()
              }
              private fun startReading(){Thread{val buf=ByteArray(256);val sb=StringBuilder();while(isConnected){try{val n=inStream?.read(buf)?:break;if(n>0){sb.append(String(buf,0,n));var idx:Int;while(sb.indexOf("\n").also{idx=it}>=0){val line=sb.substring(0,idx).trim();sb.delete(0,idx+1);if(line.isNotEmpty()){val c=config.parseLine(line);runOnUiThread{dispatch(line,c)}}}}
              }catch(e:Exception){break}};isConnected=false;runOnUiThread{updateUI()}}.start()}
              fun sendCmd(cmd:String){Thread{try{outStream?.write(cmd.toByteArray())}catch(e:Exception){}}.start()}
              private fun disconnect(){isConnected=false;try{socket?.close()}catch(e:Exception){};socket=null;outStream=null;inStream=null;updateUI()}
              private fun updateUI(name:String=""){if(isConnected){tvStatus.text="Terhubung";tvStatus.setTextColor(0xFF00FF88.toInt());tvDevice.text=name;btnConnect.text="Putuskan";btnConnect.setBackgroundColor(0xFFCC3333.toInt())}else{tvStatus.text="Tidak Terhubung";tvStatus.setTextColor(0xFFFF5252.toInt());tvDevice.text="";btnConnect.text="Hubungkan BT";btnConnect.setBackgroundColor(0xFF006688.toInt())}}
              fun toast(msg:String)=Toast.makeText(this,msg,Toast.LENGTH_SHORT).show()
          }
          """)

          w(UI + "/MonitorFragment.kt", r"""package com.ntech.cdi.ui

          import android.graphics.*; import android.os.Bundle; import android.view.*; import android.widget.*
          import androidx.fragment.app.Fragment; import com.ntech.cdi.CdiConfig; import com.ntech.cdi.MainActivity; import com.ntech.cdi.R
          import kotlin.math.*

          class MonitorFragment:Fragment(){
              private var tvRpm:TextView?=null; private var tvAdv:TextView?=null; private var tvEdge:TextView?=null
              private var tvRumbleStatus:TextView?=null; private var tvMap:TextView?=null; private var tvLimiter:TextView?=null
              private var tvAngle:TextView?=null; private var tvRon:TextView?=null; private var tvRof:TextView?=null
              private var gauge:GaugeView?=null; private var tvMaxRpm:TextView?=null; private var maxRpm=0
              override fun onCreateView(inf:LayoutInflater,c:ViewGroup?,s:Bundle?):View?=inf.inflate(R.layout.fragment_monitor,c,false)
              override fun onViewCreated(view:View,s:Bundle?){
                  tvRpm=view.findViewById(R.id.tvRpm); tvAdv=view.findViewById(R.id.tvAdv); tvEdge=view.findViewById(R.id.tvEdge)
                  tvRumbleStatus=view.findViewById(R.id.tvRumbleStatus); tvMap=view.findViewById(R.id.tvMap)
                  tvLimiter=view.findViewById(R.id.tvLimiter); tvAngle=view.findViewById(R.id.tvAngle)
                  tvRon=view.findViewById(R.id.tvRon); tvRof=view.findViewById(R.id.tvRof)
                  gauge=view.findViewById(R.id.gauge); tvMaxRpm=view.findViewById(R.id.tvMaxRpm)
                  view.findViewById<TextView>(R.id.btnResetMax).setOnClickListener{maxRpm=0;tvMaxRpm?.text="Max: 0 RPM"}
                  view.findViewById<TextView>(R.id.btnPullData).setOnClickListener{
                      if(MainActivity.isConnected){(activity as? MainActivity)?.sendCmd("GET\r\n");(activity as? MainActivity)?.toast("Menarik data EEPROM...")}
                      else (activity as? MainActivity)?.toast("Tidak terhubung!")
                  }
                  updateUI(); MainActivity.registerCallback("monitor"){_,_->activity?.runOnUiThread{updateUI()}}
              }
              private fun updateUI(){
                  val cfg=MainActivity.config; val rpm=cfg.lastRpm; val adv=cfg.getAdvForRpm(rpm)
                  if(rpm>maxRpm){maxRpm=rpm;tvMaxRpm?.text="Max: $maxRpm RPM"}
                  tvRpm?.text=rpm.toString(); tvAdv?.text="$adv°"
                  tvEdge?.text="Edge: ${if(cfg.edge==0)"FALLING ↓" else "RISING ↑"}"
                  // Status rumble: tampilkan zona aktif RON..ROF
                  val ronStr=if(cfg.rumbleOnRpm==0)"OFF" else "${cfg.rumbleOnRpm}"
                  val rofStr=if(cfg.rumbleOffRpm==0)"—" else "${cfg.rumbleOffRpm}"
                  tvRumbleStatus?.text=when{
                      cfg.rumbleOnRpm==0->"Rumble: OFF"
                      cfg.rumbleActive->"Rumble: AKTIF ⚡  ($ronStr–$rofStr RPM | sk${cfg.rumbleSkip}/sp${cfg.rumbleSpeed})"
                      else->"Rumble: Standby  (aktif $ronStr–$rofStr RPM)"
                  }
                  tvRumbleStatus?.setTextColor(if(cfg.rumbleActive)0xFF00FF88.toInt() else 0xFF88CCFF.toInt())
                  tvMap?.text="Aktif: ${when(cfg.activeMap){2->"Map 2 Touring";3->"Map 3 Racing";else->"Map 1 Harian"}}"
                  tvLimiter?.text="Limiter: ${cfg.rpmLimiter} RPM"
                  tvAngle?.text="Pulser: ${CdiConfig.angleStr(cfg.pulserAngleX10)}"
                  // RON/ROF dengan label yang benar
                  tvRon?.text="RON: aktif di atas ${if(cfg.rumbleOnRpm==0)"—" else "${cfg.rumbleOnRpm} RPM"}"
                  tvRof?.text="ROF: mati di atas ${if(cfg.rumbleOffRpm==0)"—" else "${cfg.rumbleOffRpm} RPM"}"
                  gauge?.setRpm(rpm,cfg.rpmLimiter)
                  tvRpm?.setTextColor(when{rpm>=cfg.rpmLimiter->0xFFFF3333.toInt();rpm>=cfg.rpmLimiter*0.85->0xFFFFAA00.toInt();rpm>0->0xFF00FF88.toInt();else->0xFF88AACC.toInt()})
              }
              override fun onDestroyView(){super.onDestroyView();MainActivity.unregisterCallback("monitor")}
          }

          class GaugeView(context:android.content.Context,attrs:android.util.AttributeSet?=null):View(context,attrs){
              private var rpm=0;private var maxRpm=12000
              private val pBg=Paint(Paint.ANTI_ALIAS_FLAG).apply{color=Color.parseColor("#0A1520");style=Paint.Style.FILL}
              private val pArcBg=Paint(Paint.ANTI_ALIAS_FLAG).apply{style=Paint.Style.STROKE;strokeWidth=22f;color=Color.parseColor("#1A2840")}
              private val pArc=Paint(Paint.ANTI_ALIAS_FLAG).apply{style=Paint.Style.STROKE;strokeWidth=22f;strokeCap=Paint.Cap.ROUND}
              private val pTick=Paint(Paint.ANTI_ALIAS_FLAG).apply{color=Color.parseColor("#445566");strokeWidth=2f;style=Paint.Style.STROKE}
              private val pNeedle=Paint(Paint.ANTI_ALIAS_FLAG).apply{color=Color.WHITE;strokeWidth=5f;strokeCap=Paint.Cap.ROUND}
              private val pText=Paint(Paint.ANTI_ALIAS_FLAG).apply{color=Color.parseColor("#7799AA");textAlign=Paint.Align.CENTER}
              private val pCenter=Paint(Paint.ANTI_ALIAS_FLAG).apply{color=Color.parseColor("#00E5FF");style=Paint.Style.FILL}
              fun setRpm(r:Int,max:Int){rpm=r;maxRpm=max;invalidate()}
              override fun onDraw(canvas:Canvas){
                  val w=width.toFloat();val h=height.toFloat();val cx=w/2f;val cy=h*0.58f;val rad=minOf(w,h)*0.40f
                  canvas.drawCircle(cx,cy,rad+14,pBg)
                  val rect=RectF(cx-rad,cy-rad,cx+rad,cy+rad); canvas.drawArc(rect,150f,240f,false,pArcBg)
                  val frac=(rpm.toFloat()/maxRpm.toFloat()).coerceIn(0f,1f)
                  if(frac>0f){pArc.color=when{frac>0.85f->Color.parseColor("#FF3333");frac>0.70f->Color.parseColor("#FFAA00");else->Color.parseColor("#00E5FF")};canvas.drawArc(rect,150f,frac*240f,false,pArc)}
                  for(i in 0..16){val a=Math.toRadians(150.0+i*(240.0/16));val fr=i.toFloat()/16;val inner=if(i%4==0)rad-32f else rad-18f;canvas.drawLine((cx+cos(a)*(rad-2)).toFloat(),(cy+sin(a)*(rad-2)).toFloat(),(cx+cos(a)*inner).toFloat(),(cy+sin(a)*inner).toFloat(),pTick);if(i%4==0){pText.textSize=rad*0.13f;canvas.drawText("${(fr*maxRpm/1000).toInt()}k",(cx+cos(a)*(inner-18)).toFloat(),(cy+sin(a)*(inner-18)).toFloat()+8f,pText)}}
                  val na=Math.toRadians(150.0+frac*240.0);canvas.drawLine(cx,cy,(cx+cos(na)*(rad-28)).toFloat(),(cy+sin(na)*(rad-28)).toFloat(),pNeedle);canvas.drawCircle(cx,cy,9f,pCenter)
              }
              override fun onMeasure(w:Int,h:Int){val sz=MeasureSpec.getSize(w);setMeasuredDimension(sz,(sz*0.60f).toInt())}
          }
          """)

          w(UI + "/KurvaFragment.kt", r"""package com.ntech.cdi.ui

          import android.graphics.*; import android.os.Bundle; import android.view.*; import android.widget.*
          import androidx.appcompat.app.AlertDialog; import androidx.fragment.app.Fragment
          import com.ntech.cdi.CdiConfig; import com.ntech.cdi.MainActivity; import com.ntech.cdi.R; import kotlin.math.*

          class KurvaFragment:Fragment(){
              private val cells=Array(3){arrayOfNulls<TextView>(32)}; private var chart:MapChartView?=null
              private var tvMapLabel:TextView?=null; private var currentMap=1; private var tableBuilt=false
              override fun onCreateView(inf:LayoutInflater,c:ViewGroup?,s:Bundle?):View?=inf.inflate(R.layout.fragment_kurva,c,false)
              override fun onViewCreated(view:View,s:Bundle?){
                  chart=view.findViewById(R.id.mapChart); tvMapLabel=view.findViewById(R.id.tvMapLabel)
                  view.findViewById<TextView>(R.id.tabM1).setOnClickListener{selectMap(view,1)}
                  view.findViewById<TextView>(R.id.tabM2).setOnClickListener{selectMap(view,2)}
                  view.findViewById<TextView>(R.id.tabM3).setOnClickListener{selectMap(view,3)}
                  view.findViewById<TextView>(R.id.btnSendMap).setOnClickListener{
                      if(!MainActivity.isConnected){toast("Tidak terhubung!");return@setOnClickListener}
                      val cfg=MainActivity.config;val arr=cfg.mapArray(currentMap);val pfx=when(currentMap){2->"M2";3->"M3";else->"M1"}
                      (activity as? MainActivity)?.sendCmd(cfg.buildMapCmd(pfx,arr));(activity as? MainActivity)?.sendCmd("ACT:$currentMap\r\n")
                      toast("Map $currentMap terkirim & tersimpan EEPROM")
                  }
                  view.findViewById<TextView>(R.id.btnSendAll).setOnClickListener{
                      if(!MainActivity.isConnected){toast("Tidak terhubung!");return@setOnClickListener}
                      val cfg=MainActivity.config;val act=activity as? MainActivity
                      act?.sendCmd(cfg.buildMapCmd("M1",cfg.map1));Thread.sleep(80);act?.sendCmd(cfg.buildMapCmd("M2",cfg.map2));Thread.sleep(80)
                      act?.sendCmd(cfg.buildMapCmd("M3",cfg.map3));Thread.sleep(80);act?.sendCmd("ACT:${cfg.activeMap}\r\n");toast("Semua map tersimpan EEPROM")
                  }
                  view.findViewById<TextView>(R.id.btnPullData).setOnClickListener{
                      if(!MainActivity.isConnected){toast("Tidak terhubung!");return@setOnClickListener}
                      (activity as? MainActivity)?.sendCmd("GET\r\n");toast("Menarik data EEPROM...")
                  }
                  if(!tableBuilt){buildTable(view);tableBuilt=true}
                  selectMap(view,MainActivity.config.activeMap)
                  MainActivity.registerCallback("kurva"){_,isCfg->if(isCfg)activity?.runOnUiThread{refreshCells();refreshChart()}}
              }
              private fun buildTable(root:View){
                  val tbl=root.findViewById<LinearLayout>(R.id.tableLayout)?:return; tbl.removeAllViews(); val cfg=MainActivity.config
                  val hRow=LinearLayout(requireContext()).apply{orientation=LinearLayout.HORIZONTAL;setBackgroundColor(Color.parseColor("#0A1828"));setPadding(0,8,0,8)}
                  hRow.addView(mkCell("RPM",140,Color.parseColor("#00E5FF"),true,false,null,-1,-1)); hRow.addView(mkCell("Map1°",120,Color.parseColor("#00E5FF"),true,false,null,-1,-1))
                  hRow.addView(mkCell("Map2°",120,Color.parseColor("#FFAA00"),true,false,null,-1,-1)); hRow.addView(mkCell("Map3°",120,Color.parseColor("#FF5544"),true,false,null,-1,-1)); tbl.addView(hRow)
                  for(i in 0 until 32){
                      val row=LinearLayout(requireContext()).apply{orientation=LinearLayout.HORIZONTAL;setBackgroundColor(if(i%2==0)Color.parseColor("#0C1A28") else Color.parseColor("#0F1E2E"))}
                      val rc=when{i<=5->Color.parseColor("#44FF88");i<=15->Color.parseColor("#FFCC00");else->Color.parseColor("#FF6644")}
                      row.addView(mkCell(CdiConfig.rpmLabel(i),140,rc,true,false,null,i,-1))
                      for(m in 0..2){val arr=cfg.mapArray(m+1);val tv=mkCell(arr[i].toString(),120,Color.WHITE,true,true,arr,i,m);cells[m][i]=tv;row.addView(tv)}
                      tbl.addView(row)
                  }
              }
              private fun mkCell(text:String,width:Int,color:Int,bold:Boolean,clickable:Boolean,arr:IntArray?,ri:Int,mi:Int):TextView{
                  return TextView(requireContext()).apply{this.text=text;layoutParams=LinearLayout.LayoutParams(width,68);gravity=Gravity.CENTER;textSize=15f;if(bold)setTypeface(typeface,Typeface.BOLD);setTextColor(color);setPadding(4,0,4,0)
                      if(clickable&&arr!=null&&ri>=0){setBackgroundColor(Color.parseColor("#10223A"));setOnClickListener{
                          val inp=android.widget.EditText(context).apply{inputType=android.text.InputType.TYPE_CLASS_NUMBER;setText(arr[ri].toString());selectAll();textSize=20f;setTextColor(Color.WHITE);setBackgroundColor(Color.parseColor("#0A1828"));setPadding(24,16,24,16)}
                          AlertDialog.Builder(context).setTitle("${listOf("Map1","Map2","Map3")[mi]}  —  ${CdiConfig.rpmLabel(ri)} RPM").setMessage("Advance (0-60 derajat):")
                              .setView(inp).setPositiveButton("Simpan"){_,_->val v=inp.text.toString().toIntOrNull();if(v!=null&&v in 0..60){arr[ri]=v;this.text=v.toString();refreshChart()}else Toast.makeText(context,"Nilai harus 0-60",Toast.LENGTH_SHORT).show()}.setNegativeButton("Batal",null).show()
                          inp.postDelayed({inp.requestFocus();(context.getSystemService(android.content.Context.INPUT_METHOD_SERVICE) as android.view.inputmethod.InputMethodManager).showSoftInput(inp,android.view.inputmethod.InputMethodManager.SHOW_IMPLICIT)},100)
                      }}
                  }
              }
              private fun selectMap(view:View,m:Int){
                  currentMap=m; val on=0xFF00E5FF.toInt();val off=0xFF334455.toInt()
                  view.findViewById<TextView>(R.id.tabM1)?.setTextColor(if(m==1)on else off); view.findViewById<TextView>(R.id.tabM2)?.setTextColor(if(m==2)on else off); view.findViewById<TextView>(R.id.tabM3)?.setTextColor(if(m==3)on else off)
                  tvMapLabel?.text=listOf("","Map 1 — Harian","Map 2 — Touring","Map 3 — Racing")[m]
                  for(i in 0 until 32)for(mi in 0..2)cells[mi][i]?.setBackgroundColor(if(mi+1==m)Color.parseColor("#132A44") else Color.parseColor("#10223A"))
                  refreshChart()
              }
              fun refreshCells(){val cfg=MainActivity.config;for(mi in 0..2){val arr=cfg.mapArray(mi+1);for(i in 0 until 32)cells[mi][i]?.text=arr[i].toString()}}
              private fun refreshChart(){val cfg=MainActivity.config;chart?.setData(cfg.map1.toList(),cfg.map2.toList(),cfg.map3.toList(),currentMap)}
              private fun toast(msg:String)=Toast.makeText(context,msg,Toast.LENGTH_SHORT).show()
              override fun onDestroyView(){super.onDestroyView();MainActivity.unregisterCallback("kurva")}
          }

          class MapChartView(context:android.content.Context,attrs:android.util.AttributeSet?=null):View(context,attrs){
              private var m1=listOf<Int>();private var m2=listOf<Int>();private var m3=listOf<Int>();private var active=1
              private val colors=listOf(Color.parseColor("#00E5FF"),Color.parseColor("#FFAA00"),Color.parseColor("#FF5544"))
              private val paints=colors.map{c->Paint(Paint.ANTI_ALIAS_FLAG).apply{color=c;style=Paint.Style.STROKE;strokeWidth=3f}}
              private val dotP=colors.map{c->Paint(Paint.ANTI_ALIAS_FLAG).apply{color=c;style=Paint.Style.FILL}}
              private val pGrid=Paint().apply{color=Color.parseColor("#1A2840");strokeWidth=1f}
              private val pLabel=Paint(Paint.ANTI_ALIAS_FLAG).apply{color=Color.parseColor("#557788");textSize=22f;textAlign=Paint.Align.RIGHT}
              private val pFill=colors.map{c->Paint(Paint.ANTI_ALIAS_FLAG).apply{color=Color.argb(40,Color.red(c),Color.green(c),Color.blue(c));style=Paint.Style.FILL}}
              fun setData(a1:List<Int>,a2:List<Int>,a3:List<Int>,act:Int){m1=a1;m2=a2;m3=a3;active=act;invalidate()}
              override fun onDraw(canvas:Canvas){
                  val w=width.toFloat();val h=height.toFloat();val padL=52f;val padR=8f;val padT=16f;val padB=8f;val gw=w-padL-padR;val gh=h-padT-padB
                  canvas.drawColor(Color.parseColor("#080E18"))
                  for(deg in 0..60 step 10){val y=padT+gh-(deg.toFloat()/60f*gh);canvas.drawLine(padL,y,w-padR,y,pGrid);canvas.drawText("$deg",padL-4f,y+7f,pLabel)}
                  val maps=listOf(m1,m2,m3);val order=listOf(0,1,2).sortedBy{if(it+1==active)1 else 0}
                  for(mi in order){val data=maps[mi];if(data.isEmpty())continue;val step=gw/(data.size-1);val path=Path();val fill=Path()
                      data.forEachIndexed{i,v->val x=padL+i*step;val y=padT+gh-(v.toFloat()/60f*gh);if(i==0){path.moveTo(x,y);fill.moveTo(x,padT+gh)}else path.lineTo(x,y);fill.lineTo(x,y)}
                      fill.lineTo(padL+(data.size-1)*step,padT+gh);fill.close();canvas.drawPath(fill,pFill[mi]);canvas.drawPath(path,paints[mi])
                      if(mi+1==active)data.forEachIndexed{i,v->canvas.drawCircle(padL+i*step,padT+gh-(v.toFloat()/60f*gh),6f,dotP[mi])}}
                  val lNames=listOf("■ M1","■ M2","■ M3")
                  for(i in 0..2){val lp=Paint(Paint.ANTI_ALIAS_FLAG).apply{color=colors[i];textSize=24f};canvas.drawText(lNames[i],padL+10f+i*90f,padT+20f,lp)}
              }
              override fun onMeasure(w:Int,h:Int){val width=MeasureSpec.getSize(w);setMeasuredDimension(width,(width*0.55f).toInt())}
          }
          """)

          w(UI + "/SettingFragment.kt", r"""package com.ntech.cdi.ui

          import android.os.Bundle; import android.view.*; import android.widget.*
          import androidx.fragment.app.Fragment; import com.ntech.cdi.CdiConfig; import com.ntech.cdi.MainActivity; import com.ntech.cdi.R

          class SettingFragment:Fragment(){
              private var etLimiter:EditText?=null; private var etAngle:EditText?=null; private var etScr:EditText?=null
              private var spEdge:Spinner?=null; private var etRon:EditText?=null; private var etRof:EditText?=null
              private var etRsk:EditText?=null; private var etRsp:EditText?=null
              private var tvAngleDisplay:TextView?=null; private var tvRumblePreview:TextView?=null; private var tvRumbleZone:TextView?=null
              override fun onCreateView(inf:LayoutInflater,c:ViewGroup?,s:Bundle?):View?=inf.inflate(R.layout.fragment_setting,c,false)
              override fun onViewCreated(view:View,s:Bundle?){
                  etLimiter=view.findViewById(R.id.etLimiter); etAngle=view.findViewById(R.id.etAngle); etScr=view.findViewById(R.id.etScr)
                  spEdge=view.findViewById(R.id.spEdge); etRon=view.findViewById(R.id.etRon); etRof=view.findViewById(R.id.etRof)
                  etRsk=view.findViewById(R.id.etRsk); etRsp=view.findViewById(R.id.etRsp)
                  tvAngleDisplay=view.findViewById(R.id.tvAngleDisplay); tvRumblePreview=view.findViewById(R.id.tvRumblePreview); tvRumbleZone=view.findViewById(R.id.tvRumbleZone)
                  spEdge?.adapter=ArrayAdapter(requireContext(),android.R.layout.simple_spinner_dropdown_item,listOf("FALLING ↓  (5V ke 0V)","RISING ↑  (0V ke 5V)"))
                  loadConfig()
                  view.findViewById<TextView>(R.id.btnSendLim).setOnClickListener{val v=etLimiter?.text.toString().toIntOrNull();if(v!=null&&v in 1000..16000){MainActivity.config.rpmLimiter=v;ss("LIM:$v\r\n","Limiter $v RPM")}else toast("Range: 1000-16000")}
                  view.findViewById<TextView>(R.id.btnSendAngle).setOnClickListener{val v=etAngle?.text.toString().toIntOrNull();if(v!=null&&v in 100..1800){MainActivity.config.pulserAngleX10=v;tvAngleDisplay?.text="= ${CdiConfig.angleStr(v)}";ss("ANG:$v\r\n","Pulser Angle ${CdiConfig.angleStr(v)}")}else toast("100-1800 (contoh: 1115=111,5°  630=63,0°)")}
                  etAngle?.addTextChangedListener(object:android.text.TextWatcher{override fun beforeTextChanged(s:CharSequence?,a:Int,b:Int,c:Int){}; override fun onTextChanged(s:CharSequence?,a:Int,b:Int,c:Int){}
                      override fun afterTextChanged(s:android.text.Editable?){val v=s?.toString()?.toIntOrNull();tvAngleDisplay?.text=if(v!=null&&v in 100..1800)"= ${CdiConfig.angleStr(v)}" else ""}})
                  view.findViewById<TextView>(R.id.btnSendScr).setOnClickListener{val us=etScr?.text.toString().toIntOrNull();if(us!=null&&us in 100..2000){val t=CdiConfig.usToTick(us);MainActivity.config.scrPulse=t;ss("SCR:$t\r\n","SCR ${us}µs")}else toast("Range: 100-2000 µs")}
                  view.findViewById<TextView>(R.id.btnSendEdge).setOnClickListener{val e=spEdge?.selectedItemPosition?:0;MainActivity.config.edge=e;ss("EDG:$e\r\n","Edge ${if(e==0)"Falling" else "Rising"}")}
                  view.findViewById<TextView>(R.id.btnSendRumble).setOnClickListener{
                      val ron=etRon?.text.toString().toIntOrNull()?:0; val rof=etRof?.text.toString().toIntOrNull()?:0
                      val rsk=etRsk?.text.toString().toIntOrNull()?:4; val rsp=etRsp?.text.toString().toIntOrNull()?:1
                      if(ron!=0&&ron !in 100..5000){toast("RON: 100-5000 atau 0=OFF");return@setOnClickListener}
                      if(ron>0&&(rof<=ron||rof>8000)){toast("ROF harus > RON dan <= 8000");return@setOnClickListener}
                      if(rsk !in 2..8){toast("RSK: 2-8");return@setOnClickListener}
                      if(rsp<1||rsp>=rsk){toast("RSP: 1 sampai ${rsk-1}");return@setOnClickListener}
                      val cfg=MainActivity.config; cfg.rumbleOnRpm=ron; cfg.rumbleOffRpm=rof; cfg.rumbleSkip=rsk; cfg.rumbleSpeed=rsp
                      val act=activity as? MainActivity
                      act?.sendCmd("RON:$ron\r\n");Thread.sleep(40);act?.sendCmd("ROF:$rof\r\n");Thread.sleep(40)
                      act?.sendCmd("RSK:$rsk\r\n");Thread.sleep(40);act?.sendCmd("RSP:$rsp\r\n")
                      updateRumblePreview(ron,rof,rsk,rsp); toast("Rumble tersimpan ke EEPROM")
                  }
                  view.findViewById<TextView>(R.id.btnPullData).setOnClickListener{if(!MainActivity.isConnected){toast("Tidak terhubung!");return@setOnClickListener};(activity as? MainActivity)?.sendCmd("GET\r\n");toast("Menarik data EEPROM...")}
                  view.findViewById<TextView>(R.id.btnSaveAll).setOnClickListener{
                      if(!MainActivity.isConnected){toast("Tidak terhubung!");return@setOnClickListener}
                      val cfg=MainActivity.config;val act=activity as? MainActivity
                      act?.sendCmd(cfg.buildMapCmd("M1",cfg.map1));Thread.sleep(80);act?.sendCmd(cfg.buildMapCmd("M2",cfg.map2));Thread.sleep(80)
                      act?.sendCmd(cfg.buildMapCmd("M3",cfg.map3));Thread.sleep(80);act?.sendCmd("LIM:${cfg.rpmLimiter}\r\n");Thread.sleep(40)
                      act?.sendCmd("ANG:${cfg.pulserAngleX10}\r\n");Thread.sleep(40);act?.sendCmd("SCR:${cfg.scrPulse}\r\n");Thread.sleep(40)
                      act?.sendCmd("EDG:${cfg.edge}\r\n");Thread.sleep(40);act?.sendCmd("RON:${cfg.rumbleOnRpm}\r\n");Thread.sleep(40)
                      act?.sendCmd("ROF:${cfg.rumbleOffRpm}\r\n");Thread.sleep(40);act?.sendCmd("RSK:${cfg.rumbleSkip}\r\n");Thread.sleep(40)
                      act?.sendCmd("RSP:${cfg.rumbleSpeed}\r\n"); toast("Semua data tersimpan ke EEPROM!")
                  }
                  view.findViewById<TextView>(R.id.btnChangeBg).setOnClickListener{(activity as? MainActivity)?.changeBg()}
                  MainActivity.registerCallback("setting"){_,isCfg->if(isCfg)activity?.runOnUiThread{loadConfig()}}
              }
              private fun loadConfig(){
                  val cfg=MainActivity.config
                  etLimiter?.setText(cfg.rpmLimiter.toString()); etAngle?.setText(cfg.pulserAngleX10.toString())
                  tvAngleDisplay?.text="= ${CdiConfig.angleStr(cfg.pulserAngleX10)}"
                  etScr?.setText(CdiConfig.tickToUs(cfg.scrPulse).toString()); spEdge?.setSelection(cfg.edge.coerceIn(0,1))
                  etRon?.setText(cfg.rumbleOnRpm.toString()); etRof?.setText(cfg.rumbleOffRpm.toString())
                  etRsk?.setText(cfg.rumbleSkip.toString()); etRsp?.setText(cfg.rumbleSpeed.toString())
                  updateRumblePreview(cfg.rumbleOnRpm,cfg.rumbleOffRpm,cfg.rumbleSkip,cfg.rumbleSpeed)
              }
              private fun updateRumblePreview(ron:Int,rof:Int,rsk:Int,rsp:Int){
                  val fire=(rsk-rsp).coerceAtLeast(1); val sb=StringBuilder("Pola: ")
                  for(i in 1..rsk) sb.append(if(i<=fire)"⚡" else "✗")
                  sb.append("  (fire=$fire skip=$rsp dari $rsk spark)")
                  tvRumblePreview?.text=sb.toString()
                  // Tampilkan zona aktif
                  tvRumbleZone?.text=if(ron==0)"Rumble OFF" else "Zona aktif: $ron RPM  →  $rof RPM"
              }
              private fun ss(cmd:String,msg:String){if(!MainActivity.isConnected){toast("Tidak terhubung!");return};(activity as? MainActivity)?.sendCmd(cmd);toast("$msg → tersimpan EEPROM")}
              private fun toast(msg:String)=Toast.makeText(context,msg,Toast.LENGTH_SHORT).show()
              override fun onDestroyView(){super.onDestroyView();MainActivity.unregisterCallback("setting")}
          }
          """)

          print("Kotlin OK!")
