name: Build NTECH CDI Tuner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Write Kotlin source files
        run: |
          python3 - << 'PYEOF'
          import os

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              open(path, 'w', encoding='utf-8').write(content)

          B   = "NtechCDI"
          PKG = B + "/app/src/main/java/com/ntech/cdi"
          UI  = PKG + "/ui"

          # ── CdiConfig.kt ─────────────────────────────────────
          w(PKG + "/CdiConfig.kt", r"""package com.ntech.cdi

          class CdiConfig {
              val map1 = IntArray(32) { defaultMap1[it] }
              val map2 = IntArray(32) { defaultMap2[it] }
              val map3 = IntArray(32) { defaultMap3[it] }
              var rpmLimiter = 12000
              var pulserAngle = 63
              var scrPulse = 1000
              var rumbleRpm = 0
              var rumbleSkip = 3
              var activeMap = 1
              var edge = 0
              var lastRpm = 0

              companion object {
                  val defaultMap1 = intArrayOf(0,8,15,20,24,28,30,32,34,34,34,34,34,34,34,34,34,34,34,34,34,32,30,27,23,19,17,15,15,15,10,10)
                  val defaultMap2 = intArrayOf(0,6,12,18,22,26,28,30,32,32,32,32,32,32,32,32,32,32,32,30,28,26,24,22,20,17,15,12,12,12,8,8)
                  val defaultMap3 = intArrayOf(0,5,12,18,24,30,34,36,38,40,40,40,40,40,38,36,34,32,30,28,26,24,22,20,18,15,12,10,10,10,8,8)
                  fun rpmLabel(i: Int) = if (i == 0) "Idle" else "${i * 500} RPM"
                  fun tickToUs(tick: Int) = tick / 2
                  fun usToTick(us: Int) = us * 2
              }

              fun activeMapArray() = when (activeMap) { 2 -> map2; 3 -> map3; else -> map1 }

              // Kembalikan true jika line adalah config penuh (dari GET)
              // false jika hanya RPM/ACT live atau OK
              fun parseLine(line: String): Boolean {
                  return when {
                      line.startsWith("RPM:") -> { lastRpm = line.removePrefix("RPM:").toIntOrNull() ?: lastRpm; false }
                      line.startsWith("ACT:") -> { activeMap = line.removePrefix("ACT:").toIntOrNull() ?: activeMap; false }
                      line == "OK"            -> false   // CDI konfirmasi setting → JANGAN reload UI
                      line == "ERR"           -> false
                      line.startsWith("LIM:") -> { rpmLimiter = line.removePrefix("LIM:").toIntOrNull() ?: rpmLimiter; true }
                      line.startsWith("ANG:") -> { pulserAngle = line.removePrefix("ANG:").toIntOrNull() ?: pulserAngle; true }
                      line.startsWith("SCR:") -> { scrPulse = line.removePrefix("SCR:").toIntOrNull() ?: scrPulse; true }
                      line.startsWith("RBL:") -> { rumbleRpm = line.removePrefix("RBL:").toIntOrNull() ?: rumbleRpm; true }
                      line.startsWith("RSK:") -> { rumbleSkip = line.removePrefix("RSK:").toIntOrNull() ?: rumbleSkip; true }
                      line.startsWith("EDG:") -> { edge = line.removePrefix("EDG:").toIntOrNull() ?: edge; true }
                      line.startsWith("M1:") -> { line.removePrefix("M1:").split(",").forEachIndexed { i, v -> if (i < 32) map1[i] = v.trim().toIntOrNull() ?: map1[i] }; true }
                      line.startsWith("M2:") -> { line.removePrefix("M2:").split(",").forEachIndexed { i, v -> if (i < 32) map2[i] = v.trim().toIntOrNull() ?: map2[i] }; true }
                      line.startsWith("M3:") -> { line.removePrefix("M3:").split(",").forEachIndexed { i, v -> if (i < 32) map3[i] = v.trim().toIntOrNull() ?: map3[i] }; true }
                      else -> false
                  }
              }

              fun buildMapCmd(prefix: String, arr: IntArray) = prefix + ":" + arr.joinToString(",") + "\r\n"
          }
          """)

          # ── ConnectionManager.kt ──────────────────────────────
          # Mengelola koneksi Bluetooth DAN OTG USB serial
          w(PKG + "/ConnectionManager.kt", r"""package com.ntech.cdi

          import android.app.PendingIntent
          import android.content.Context
          import android.content.Intent
          import android.hardware.usb.UsbManager
          import com.hoho.android.usbserial.driver.UsbSerialProber
          import com.hoho.android.usbserial.driver.UsbSerialPort
          import java.io.InputStream
          import java.io.OutputStream

          object ConnectionManager {

              var usbPort: UsbSerialPort? = null
              private val usbReadBuf = ByteArray(256)

              fun getUsbDevices(ctx: Context): List<Pair<String, com.hoho.android.usbserial.driver.UsbSerialDriver>> {
                  val usbManager = ctx.getSystemService(Context.USB_SERVICE) as UsbManager
                  val drivers = UsbSerialProber.getDefaultProber().findAllDrivers(usbManager)
                  return drivers.map { d ->
                      val dev = d.device
                      "${dev.manufacturerName ?: "USB"} ${dev.productName ?: dev.deviceName}" to d
                  }
              }

              fun connectUsb(
                  ctx: Context,
                  driver: com.hoho.android.usbserial.driver.UsbSerialDriver,
                  baud: Int = 9600,
                  onSuccess: (String) -> Unit,
                  onError: (String) -> Unit
              ) {
                  val usbManager = ctx.getSystemService(Context.USB_SERVICE) as UsbManager
                  if (!usbManager.hasPermission(driver.device)) {
                      val pi = PendingIntent.getBroadcast(ctx, 0,
                          Intent("com.ntech.cdi.USB_PERMISSION"),
                          PendingIntent.FLAG_IMMUTABLE)
                      usbManager.requestPermission(driver.device, pi)
                      onError("Meminta izin USB..."); return
                  }
                  try {
                      val conn = usbManager.openDevice(driver.device) ?: run { onError("Gagal buka USB"); return }
                      val port = driver.ports[0]
                      port.open(conn)
                      port.setParameters(baud, 8, UsbSerialPort.STOPBITS_1, UsbSerialPort.PARITY_NONE)
                      usbPort = port
                      onSuccess(driver.device.productName ?: "USB Serial")
                  } catch (e: Exception) {
                      onError(e.message ?: "USB error")
                  }
              }

              fun writeUsb(data: ByteArray) {
                  try { usbPort?.write(data, 200) } catch (e: Exception) { }
              }

              fun readUsb(): String? {
                  return try {
                      val n = usbPort?.read(usbReadBuf, 100) ?: 0
                      if (n > 0) String(usbReadBuf, 0, n) else null
                  } catch (e: Exception) { null }
              }

              fun closeUsb() {
                  try { usbPort?.close() } catch (e: Exception) { }
                  usbPort = null
              }
          }
          """)

          # ── MainActivity.kt ───────────────────────────────────
          w(PKG + "/MainActivity.kt", r"""package com.ntech.cdi

          import android.Manifest
          import android.annotation.SuppressLint
          import android.bluetooth.BluetoothAdapter
          import android.bluetooth.BluetoothDevice
          import android.bluetooth.BluetoothSocket
          import android.graphics.BitmapFactory
          import android.graphics.drawable.BitmapDrawable
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.widget.*
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AlertDialog
          import androidx.appcompat.app.AppCompatActivity
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.ui.MapFragment
          import com.ntech.cdi.ui.MonitorFragment
          import com.ntech.cdi.ui.SettingsFragment
          import java.io.InputStream
          import java.io.OutputStream
          import java.util.UUID

          class MainActivity : AppCompatActivity() {

              companion object {
                  var btSocket: BluetoothSocket? = null
                  var outStream: OutputStream? = null
                  var inStream: InputStream? = null
                  var isBtConnected = false
                  var isUsbConnected = false
                  val isConnected get() = isBtConnected || isUsbConnected

                  val config = CdiConfig()

                  // Multi-callback: tiap fragment daftar sendiri
                  private val callbacks = mutableMapOf<String, (line: String, isConfig: Boolean) -> Unit>()
                  fun registerCallback(tag: String, cb: (String, Boolean) -> Unit) { callbacks[tag] = cb }
                  fun unregisterCallback(tag: String) { callbacks.remove(tag) }
                  fun dispatch(line: String, isConfig: Boolean) { callbacks.values.forEach { it(line, isConfig) } }
              }

              private lateinit var tvStatus: TextView
              private lateinit var btnConnect: TextView
              private lateinit var btnConnectUsb: TextView
              private lateinit var tvInfo: TextView
              private lateinit var navMonitor: TextView
              private lateinit var navMap: TextView
              private lateinit var navSettings: TextView

              private val pickImage = registerForActivityResult(ActivityResultContracts.GetContent()) { uri ->
                  uri?.let {
                      getSharedPreferences("ntech", MODE_PRIVATE).edit().putString("bg_uri", it.toString()).apply()
                      applyBg(it.toString())
                      Toast.makeText(this, "Background diubah", Toast.LENGTH_SHORT).show()
                  }
              }
              private val reqBt = registerForActivityResult(ActivityResultContracts.RequestMultiplePermissions()) { perms ->
                  if (perms.values.all { it }) showBtDialog()
                  else Toast.makeText(this, "Izin BT diperlukan", Toast.LENGTH_SHORT).show()
              }

              override fun onCreate(s: Bundle?) {
                  super.onCreate(s)
                  setContentView(R.layout.activity_main)
                  tvStatus       = findViewById(R.id.tvStatus)
                  btnConnect     = findViewById(R.id.btnConnect)
                  btnConnectUsb  = findViewById(R.id.btnConnectUsb)
                  tvInfo         = findViewById(R.id.tvInfo)
                  navMonitor     = findViewById(R.id.navMonitor)
                  navMap         = findViewById(R.id.navMap)
                  navSettings    = findViewById(R.id.navSettings)
                  getSharedPreferences("ntech", MODE_PRIVATE).getString("bg_uri", null)?.let { applyBg(it) }
                  btnConnect.setOnClickListener { if (isBtConnected) disconnectBt() else checkBt() }
                  btnConnectUsb.setOnClickListener { if (isUsbConnected) disconnectUsb() else showUsbDialog() }
                  navMonitor.setOnClickListener  { showTab(0) }
                  navMap.setOnClickListener      { showTab(1) }
                  navSettings.setOnClickListener { showTab(2) }
                  showTab(0); updateUI()
              }

              fun applyBg(u: String) {
                  try {
                      val bmp = BitmapFactory.decodeStream(contentResolver.openInputStream(Uri.parse(u)))
                      findViewById<android.widget.FrameLayout>(R.id.fragContainer).background = BitmapDrawable(resources, bmp)
                  } catch (e: Exception) { }
              }
              fun changeBg() = pickImage.launch("image/*")

              private fun showTab(tab: Int) {
                  val frag: Fragment = when (tab) { 0 -> MonitorFragment(); 1 -> MapFragment(); else -> SettingsFragment() }
                  supportFragmentManager.beginTransaction().replace(R.id.fragContainer, frag).commit()
                  val o = 0xFFFF6B00.toInt(); val w = 0xFFFFFFFF.toInt()
                  navMonitor.setTextColor(if (tab == 0) o else w)
                  navMap.setTextColor(if (tab == 1) o else w)
                  navSettings.setTextColor(if (tab == 2) o else w)
              }

              // ── Bluetooth ────────────────────────────────────
              private fun checkBt() {
                  if (Build.VERSION.SDK_INT >= 31)
                      reqBt.launch(arrayOf(Manifest.permission.BLUETOOTH_SCAN, Manifest.permission.BLUETOOTH_CONNECT))
                  else showBtDialog()
              }

              @SuppressLint("MissingPermission")
              private fun showBtDialog() {
                  val ba = BluetoothAdapter.getDefaultAdapter() ?: run { toast("BT tidak tersedia"); return }
                  if (!ba.isEnabled) { toast("Aktifkan Bluetooth"); return }
                  val paired = ba.bondedDevices.toList()
                  if (paired.isEmpty()) { toast("Tidak ada perangkat BT"); return }
                  AlertDialog.Builder(this).setTitle("Pilih HC-05 (Bluetooth)")
                      .setItems(paired.map { "${it.name} | ${it.address}" }.toTypedArray()) { _, i -> connectBt(paired[i]) }
                      .show()
              }

              @SuppressLint("MissingPermission")
              private fun connectBt(dev: BluetoothDevice) {
                  tvStatus.text = "Menghubungkan BT..."; tvStatus.setTextColor(0xFFFF9800.toInt())
                  Thread {
                      try {
                          val s = dev.createRfcommSocketToServiceRecord(UUID.fromString("00001101-0000-1000-8000-00805F9B34FB"))
                          s.connect(); btSocket = s; outStream = s.outputStream; inStream = s.inputStream; isBtConnected = true
                          runOnUiThread { updateUI(dev.name) }
                          startBtReading(); sendCmd("GET\r\n")
                      } catch (e: Exception) {
                          isBtConnected = false
                          runOnUiThread { tvStatus.text = "BT Gagal"; tvStatus.setTextColor(0xFFFF3333.toInt()); toast(e.message ?: "Error") }
                      }
                  }.start()
              }

              private fun startBtReading() {
                  Thread {
                      val buf = ByteArray(256); val sb = StringBuilder()
                      while (isBtConnected) {
                          try {
                              val n = inStream?.read(buf) ?: break
                              if (n > 0) {
                                  sb.append(String(buf, 0, n))
                                  var idx: Int
                                  while (sb.indexOf("\n").also { idx = it } >= 0) {
                                      val line = sb.substring(0, idx).trim(); sb.delete(0, idx + 1)
                                      if (line.isNotEmpty()) {
                                          val isCfg = config.parseLine(line)
                                          runOnUiThread { dispatch(line, isCfg) }
                                      }
                                  }
                              }
                          } catch (e: Exception) { break }
                      }
                  }.start()
              }

              private fun disconnectBt() {
                  isBtConnected = false
                  try { btSocket?.close() } catch (e: Exception) { }
                  btSocket = null; outStream = null; inStream = null; updateUI()
              }

              // ── USB OTG ──────────────────────────────────────
              private fun showUsbDialog() {
                  val devices = ConnectionManager.getUsbDevices(this)
                  if (devices.isEmpty()) { toast("Tidak ada perangkat USB OTG"); return }
                  AlertDialog.Builder(this).setTitle("Pilih USB Serial (OTG)")
                      .setItems(devices.map { it.first }.toTypedArray()) { _, i ->
                          ConnectionManager.connectUsb(this, devices[i].second,
                              onSuccess = { name ->
                                  isUsbConnected = true
                                  runOnUiThread { updateUI("USB: $name") }
                                  startUsbReading(); sendCmd("GET\r\n")
                              },
                              onError = { msg -> runOnUiThread { toast(msg) } }
                          )
                      }.show()
              }

              private fun startUsbReading() {
                  Thread {
                      val sb = StringBuilder()
                      while (isUsbConnected) {
                          try {
                              val chunk = ConnectionManager.readUsb()
                              if (chunk != null) {
                                  sb.append(chunk)
                                  var idx: Int
                                  while (sb.indexOf("\n").also { idx = it } >= 0) {
                                      val line = sb.substring(0, idx).trim(); sb.delete(0, idx + 1)
                                      if (line.isNotEmpty()) {
                                          val isCfg = config.parseLine(line)
                                          runOnUiThread { dispatch(line, isCfg) }
                                      }
                                  }
                              } else Thread.sleep(10)
                          } catch (e: Exception) { break }
                      }
                  }.start()
              }

              private fun disconnectUsb() {
                  isUsbConnected = false
                  ConnectionManager.closeUsb(); updateUI()
              }

              // ── Send command (BT atau USB) ────────────────────
              fun sendCmd(cmd: String) {
                  Thread {
                      try {
                          val bytes = cmd.toByteArray()
                          if (isBtConnected) outStream?.write(bytes)
                          else if (isUsbConnected) ConnectionManager.writeUsb(bytes)
                      } catch (e: Exception) { }
                  }.start()
              }

              private fun updateUI(name: String = "") {
                  if (isConnected) {
                      tvStatus.text = "Terhubung"; tvStatus.setTextColor(0xFF00E676.toInt())
                      tvInfo.text = name
                      btnConnect.text = if (isBtConnected) "Putus BT" else "BT"
                      btnConnect.setBackgroundColor(if (isBtConnected) 0xFFCC3333.toInt() else 0xFF555555.toInt())
                      btnConnectUsb.text = if (isUsbConnected) "Putus OTG" else "OTG"
                      btnConnectUsb.setBackgroundColor(if (isUsbConnected) 0xFFCC3333.toInt() else 0xFF555555.toInt())
                  } else {
                      tvStatus.text = "Terputus"; tvStatus.setTextColor(0xFFFF5252.toInt())
                      tvInfo.text = ""
                      btnConnect.text = "Bluetooth"; btnConnect.setBackgroundColor(0xFFFF6B00.toInt())
                      btnConnectUsb.text = "USB OTG"; btnConnectUsb.setBackgroundColor(0xFF1565C0.toInt())
                  }
              }

              private fun toast(msg: String) = Toast.makeText(this, msg, Toast.LENGTH_SHORT).show()
          }
          """)

          # ── MonitorFragment.kt ────────────────────────────────
          w(UI + "/MonitorFragment.kt", r"""package com.ntech.cdi.ui

          import android.os.Bundle
          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.ProgressBar
          import android.widget.TextView
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.CdiConfig
          import com.ntech.cdi.MainActivity
          import com.ntech.cdi.R

          class MonitorFragment : Fragment() {
              private lateinit var tvRpm: TextView
              private lateinit var rpmBar: ProgressBar
              private lateinit var tvMap: TextView
              private lateinit var tvLim: TextView
              private lateinit var tvAng: TextView
              private lateinit var tvEdge: TextView
              private lateinit var tvScr: TextView
              private lateinit var tvMax: TextView
              private var maxRpm = 0

              override fun onCreateView(inf: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  inf.inflate(R.layout.fragment_monitor, c, false)

              override fun onViewCreated(view: View, s: Bundle?) {
                  tvRpm  = view.findViewById(R.id.tvRpm)
                  rpmBar = view.findViewById(R.id.rpmBar)
                  tvMap  = view.findViewById(R.id.tvMap)
                  tvLim  = view.findViewById(R.id.tvLim)
                  tvAng  = view.findViewById(R.id.tvAng)
                  tvEdge = view.findViewById(R.id.tvEdge)
                  tvScr  = view.findViewById(R.id.tvScr)
                  tvMax  = view.findViewById(R.id.tvMax)
                  view.findViewById<TextView>(R.id.btnReset).setOnClickListener { maxRpm = 0; tvMax.text = "Max: 0 RPM" }
                  // Tombol muat ulang config: kirim GET ke CDI
                  view.findViewById<TextView>(R.id.btnRefresh).setOnClickListener {
                      if (MainActivity.isConnected) {
                          (activity as? MainActivity)?.sendCmd("GET\r\n")
                      } else {
                          android.widget.Toast.makeText(context, "Tidak terhubung", android.widget.Toast.LENGTH_SHORT).show()
                      }
                  }
                  updateDisplay()
                  // Update setiap ada data dari CDI (RPM atau config)
                  MainActivity.registerCallback("monitor") { _, _ ->
                      activity?.runOnUiThread { updateDisplay() }
                  }
              }

              private fun updateDisplay() {
                  val cfg = MainActivity.config
                  val rpm = cfg.lastRpm
                  if (rpm > maxRpm) { maxRpm = rpm; tvMax.text = "Max: $maxRpm RPM" }
                  tvRpm.text = rpm.toString()
                  rpmBar.progress = (rpm * 100 / 16000).coerceIn(0, 100)
                  tvRpm.setTextColor(when {
                      rpm >= cfg.rpmLimiter        -> 0xFFFF3333.toInt()
                      rpm >= cfg.rpmLimiter * 0.85 -> 0xFFFF9800.toInt()
                      else                         -> 0xFF00E676.toInt()
                  })
                  val mn = when (cfg.activeMap) { 2 -> "Touring"; 3 -> "Racing"; else -> "Harian" }
                  tvMap.text  = "Map ${cfg.activeMap}: $mn"
                  tvLim.text  = "Limiter: ${cfg.rpmLimiter} RPM"
                  tvAng.text  = "Pulser: ${cfg.pulserAngle}"
                  tvEdge.text = "Edge: ${if (cfg.edge == 0) "Falling" else "Rising"}"
                  tvScr.text  = "SCR: ${CdiConfig.tickToUs(cfg.scrPulse)}us"
              }

              override fun onDestroyView() { super.onDestroyView(); MainActivity.unregisterCallback("monitor") }
          }
          """)

          # ── MapFragment.kt ────────────────────────────────────
          w(UI + "/MapFragment.kt", r"""package com.ntech.cdi.ui

          import android.graphics.Color
          import android.graphics.Typeface
          import android.os.Bundle
          import android.text.*
          import android.view.*
          import android.widget.*
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.CdiConfig
          import com.ntech.cdi.MainActivity
          import com.ntech.cdi.R

          class MapFragment : Fragment() {
              private val et1 = arrayOfNulls<EditText>(32)
              private val et2 = arrayOfNulls<EditText>(32)
              private val et3 = arrayOfNulls<EditText>(32)
              private lateinit var tbl1: TableLayout
              private lateinit var tbl2: TableLayout
              private lateinit var tbl3: TableLayout
              private lateinit var tab1: TextView
              private lateinit var tab2: TextView
              private lateinit var tab3: TextView
              private var isUpdating = false

              override fun onCreateView(inf: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  inf.inflate(R.layout.fragment_map, c, false)

              override fun onViewCreated(view: View, s: Bundle?) {
                  tbl1 = view.findViewById(R.id.tbl1); tbl2 = view.findViewById(R.id.tbl2); tbl3 = view.findViewById(R.id.tbl3)
                  tab1 = view.findViewById(R.id.tab1); tab2 = view.findViewById(R.id.tab2); tab3 = view.findViewById(R.id.tab3)
                  val cfg = MainActivity.config
                  buildTable(tbl1, et1, cfg.map1)
                  buildTable(tbl2, et2, cfg.map2)
                  buildTable(tbl3, et3, cfg.map3)
                  tab1.setOnClickListener { showMap(1) }
                  tab2.setOnClickListener { showMap(2) }
                  tab3.setOnClickListener { showMap(3) }
                  view.findViewById<TextView>(R.id.btnS1).setOnClickListener { sendMap(1) }
                  view.findViewById<TextView>(R.id.btnS2).setOnClickListener { sendMap(2) }
                  view.findViewById<TextView>(R.id.btnS3).setOnClickListener { sendMap(3) }
                  view.findViewById<TextView>(R.id.btnSA).setOnClickListener {
                      sendMap(1); sendMap(2); sendMap(3)
                      Toast.makeText(context, "Semua map terkirim", Toast.LENGTH_SHORT).show()
                  }
                  showMap(cfg.activeMap)
                  // Hanya refresh tabel kalau isConfig=true (data dari GET)
                  MainActivity.registerCallback("map") { _, isConfig ->
                      if (isConfig) activity?.runOnUiThread { refreshTables() }
                  }
              }

              private fun buildTable(table: TableLayout, ets: Array<EditText?>, arr: IntArray) {
                  table.removeAllViews()
                  val h = TableRow(requireContext())
                  h.addView(mkHdr("RPM")); h.addView(mkHdr("Advance")); table.addView(h)
                  for (i in 0 until 32) {
                      val row = TableRow(requireContext())
                      val tv = TextView(requireContext()).apply {
                          text = CdiConfig.rpmLabel(i); setPadding(12,8,12,8); textSize = 12f
                          setTextColor(when { i<=6->Color.parseColor("#4CAF50"); i<=16->Color.parseColor("#FF9800"); else->Color.parseColor("#FF5252") })
                      }
                      val idx = i
                      val et = EditText(requireContext()).apply {
                          layoutParams = TableRow.LayoutParams(180, ViewGroup.LayoutParams.WRAP_CONTENT)
                          inputType = InputType.TYPE_CLASS_NUMBER; gravity = Gravity.CENTER
                          textSize = 14f; setTypeface(typeface, Typeface.BOLD)
                          setText(arr[idx].toString()); setTextColor(Color.WHITE)
                          setBackgroundResource(android.R.color.transparent); setPadding(6,4,6,4)
                          addTextChangedListener(object : TextWatcher {
                              override fun beforeTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
                              override fun onTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
                              override fun afterTextChanged(s: Editable?) {
                                  if (!isUpdating) { val n = s?.toString()?.toIntOrNull() ?: return; if (n in 0..60) arr[idx] = n }
                              }
                          })
                      }
                      ets[i] = et; row.addView(tv); row.addView(et)
                      row.setBackgroundColor(if (i%2==0) Color.parseColor("#1A1A1A") else Color.parseColor("#222222"))
                      table.addView(row)
                  }
              }

              private fun mkHdr(t: String) = TextView(requireContext()).apply {
                  text = t; setPadding(12,8,12,8); textSize = 12f
                  setTypeface(typeface, Typeface.BOLD)
                  setTextColor(Color.parseColor("#FF6B00")); setBackgroundColor(Color.parseColor("#1A1A2E"))
              }

              private fun refreshTables() {
                  isUpdating = true; val cfg = MainActivity.config
                  for (i in 0 until 32) { et1[i]?.setText(cfg.map1[i].toString()); et2[i]?.setText(cfg.map2[i].toString()); et3[i]?.setText(cfg.map3[i].toString()) }
                  isUpdating = false
              }

              private fun showMap(m: Int) {
                  tbl1.visibility = if (m==1) View.VISIBLE else View.GONE
                  tbl2.visibility = if (m==2) View.VISIBLE else View.GONE
                  tbl3.visibility = if (m==3) View.VISIBLE else View.GONE
                  val o = Color.parseColor("#FF6B00"); val g = Color.parseColor("#888888")
                  tab1.setTextColor(if(m==1)o else g); tab2.setTextColor(if(m==2)o else g); tab3.setTextColor(if(m==3)o else g)
              }

              private fun sendMap(m: Int) {
                  val cfg = MainActivity.config
                  val arr = when(m){2->cfg.map2;3->cfg.map3;else->cfg.map1}
                  val prefix = when(m){2->"M2";3->"M3";else->"M1"}
                  (activity as? MainActivity)?.sendCmd(cfg.buildMapCmd(prefix, arr))
                  (activity as? MainActivity)?.sendCmd("ACT:$m\r\n")
                  Toast.makeText(context, "Map $m terkirim", Toast.LENGTH_SHORT).show()
              }

              override fun onDestroyView() { super.onDestroyView(); MainActivity.unregisterCallback("map") }
          }
          """)

          # ── SettingsFragment.kt ───────────────────────────────
          # FIX UTAMA: update config lokal LANGSUNG saat kirim
          # loadConfig() TIDAK dipanggil dari callback (tidak reset EditText)
          w(UI + "/SettingsFragment.kt", r"""package com.ntech.cdi.ui

          import android.os.Bundle
          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.*
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.CdiConfig
          import com.ntech.cdi.MainActivity
          import com.ntech.cdi.R

          class SettingsFragment : Fragment() {
              private lateinit var etLim: EditText
              private lateinit var etAng: EditText
              private lateinit var etScr: EditText
              private lateinit var rbFalling: RadioButton
              private lateinit var rbRising: RadioButton
              private lateinit var spRpm: Spinner
              private lateinit var spSkip: Spinner

              private val rpmOpts = listOf("OFF","250 RPM","500 RPM","750 RPM","1000 RPM","1200 RPM","1500 RPM","1800 RPM","2000 RPM","2500 RPM","3000 RPM")
              private val rpmVals = listOf(0,250,500,750,1000,1200,1500,1800,2000,2500,3000)
              private val skipOpts = listOf("2 spark - Kasar","3 spark","4 spark","5 spark","6 spark","7 spark","8 spark - Halus")
              private val skipVals = listOf(2,3,4,5,6,7,8)

              override fun onCreateView(inf: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  inf.inflate(R.layout.fragment_settings, c, false)

              override fun onViewCreated(view: View, s: Bundle?) {
                  etLim     = view.findViewById(R.id.etLim)
                  etAng     = view.findViewById(R.id.etAng)
                  etScr     = view.findViewById(R.id.etScr)
                  rbFalling = view.findViewById(R.id.rbFalling)
                  rbRising  = view.findViewById(R.id.rbRising)
                  spRpm     = view.findViewById(R.id.spRpm)
                  spSkip    = view.findViewById(R.id.spSkip)
                  spRpm.adapter  = ArrayAdapter(requireContext(), android.R.layout.simple_spinner_dropdown_item, rpmOpts)
                  spSkip.adapter = ArrayAdapter(requireContext(), android.R.layout.simple_spinner_dropdown_item, skipOpts)

                  // Load nilai awal dari config
                  loadConfig()

                  view.findViewById<TextView>(R.id.btnLim).setOnClickListener {
                      val n = etLim.text.toString().toIntOrNull()
                      if (n != null && n in 1000..16000) {
                          MainActivity.config.rpmLimiter = n   // update lokal langsung
                          sendCmd("LIM:$n\r\n", "Limiter $n RPM")
                      } else toast("Range: 1000-16000")
                  }
                  view.findViewById<TextView>(R.id.btnAng).setOnClickListener {
                      val n = etAng.text.toString().toIntOrNull()
                      if (n != null && n in 30..120) {
                          MainActivity.config.pulserAngle = n   // update lokal langsung
                          sendCmd("ANG:$n\r\n", "Angle $n derajat")
                      } else toast("Range: 30-120")
                  }
                  view.findViewById<TextView>(R.id.btnScr).setOnClickListener {
                      val us = etScr.text.toString().toIntOrNull()
                      if (us != null) {
                          val tick = CdiConfig.usToTick(us)
                          if (tick in 200..4000) {
                              MainActivity.config.scrPulse = tick   // update lokal langsung
                              sendCmd("SCR:$tick\r\n", "SCR ${us}us")
                          } else toast("Range: 100-2000us")
                      }
                  }
                  view.findViewById<TextView>(R.id.btnEdge).setOnClickListener {
                      val e = if (rbFalling.isChecked) 0 else 1
                      MainActivity.config.edge = e   // update lokal langsung
                      sendCmd("EDG:$e\r\n", "Edge ${if(e==0)"Falling" else "Rising"}")
                  }
                  view.findViewById<TextView>(R.id.btnRumble).setOnClickListener {
                      val rpm  = rpmVals[spRpm.selectedItemPosition]
                      val skip = skipVals[spSkip.selectedItemPosition]
                      MainActivity.config.rumbleRpm  = rpm    // update lokal langsung
                      MainActivity.config.rumbleSkip = skip
                      val act = activity as? MainActivity
                      act?.sendCmd("RBL:$rpm\r\n")
                      act?.sendCmd("RSK:$skip\r\n")
                      toast("Rumble tersimpan")
                  }
                  view.findViewById<TextView>(R.id.btnGet).setOnClickListener {
                      if (MainActivity.isConnected) {
                          (activity as? MainActivity)?.sendCmd("GET\r\n")
                          toast("Meminta config dari CDI...")
                      } else toast("Tidak terhubung")
                  }
                  view.findViewById<TextView>(R.id.btnBg).setOnClickListener {
                      (activity as? MainActivity)?.changeBg()
                  }

                  // Settings: loadConfig() HANYA saat menerima data config lengkap (GET response)
                  // TIDAK dipanggil saat RPM datang atau "OK" datang
                  MainActivity.registerCallback("settings") { _, isConfig ->
                      if (isConfig) activity?.runOnUiThread { loadConfig() }
                  }
              }

              private fun loadConfig() {
                  val cfg = MainActivity.config
                  etLim.setText(cfg.rpmLimiter.toString())
                  etAng.setText(cfg.pulserAngle.toString())
                  etScr.setText(CdiConfig.tickToUs(cfg.scrPulse).toString())
                  if (cfg.edge == 0) rbFalling.isChecked = true else rbRising.isChecked = true
                  spRpm.setSelection(rpmVals.indexOf(cfg.rumbleRpm).takeIf { it >= 0 } ?: 0)
                  spSkip.setSelection(skipVals.indexOf(cfg.rumbleSkip).takeIf { it >= 0 } ?: 1)
              }

              private fun sendCmd(cmd: String, msg: String) {
                  (activity as? MainActivity)?.sendCmd(cmd)
                  toast("$msg → tersimpan")
              }

              private fun toast(msg: String) = Toast.makeText(context, msg, Toast.LENGTH_SHORT).show()

              override fun onDestroyView() { super.onDestroyView(); MainActivity.unregisterCallback("settings") }
          }
          """)

          print("Kotlin files OK!")
          PYEOF

