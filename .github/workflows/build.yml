                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="12dp" android:gravity="center_vertical">
                          <EditText android:id="@+id/etLim" android:layout_width="0dp" android:layout_height="48dp" android:layout_weight="1"
                              android:inputType="number" android:textColor="#00BFA5" android:textSize="18sp" android:textStyle="bold"
                              android:background="@drawable/input_bg" android:paddingLeft="12dp" android:layout_marginRight="8dp"/>
                          <TextView android:id="@+id/btnSendLim" android:layout_width="80dp" android:layout_height="48dp"
                              android:text="Kirim" android:textColor="#FFFFFF" android:textSize="12sp" android:background="@drawable/btn_teal" android:gravity="center"/>
                      </LinearLayout>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="SCR Pulse Width (us)" android:textColor="#CCCCCC" android:textSize="13sp" android:layout_marginBottom="4dp"/>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="16dp" android:gravity="center_vertical">
                          <EditText android:id="@+id/etScr" android:layout_width="0dp" android:layout_height="48dp" android:layout_weight="1"
                              android:inputType="number" android:textColor="#00BFA5" android:textSize="18sp" android:textStyle="bold"
                              android:background="@drawable/input_bg" android:paddingLeft="12dp" android:layout_marginRight="8dp"/>
                          <TextView android:id="@+id/btnSendScr" android:layout_width="80dp" android:layout_height="48dp"
                              android:text="Kirim" android:textColor="#FFFFFF" android:textSize="12sp" android:background="@drawable/btn_teal" android:gravity="center"/>
                      </LinearLayout>
                      <TextView android:id="@+id/btnSendEdge" android:layout_width="match_parent" android:layout_height="48dp"
                          android:text="Kirim Edge Setting" android:textColor="#FFFFFF" android:textSize="13sp"
                          android:background="@drawable/btn_teal" android:gravity="center" android:layout_marginBottom="8dp"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                      <TextView android:id="@+id/btnGet" android:layout_width="0dp" android:layout_height="44dp" android:layout_weight="1"
                          android:text="Baca Config CDI" android:textColor="#FFFFFF" android:textSize="12sp"
                          android:background="@drawable/btn_outline_teal" android:gravity="center" android:layout_marginRight="6dp"/>
                      <TextView android:id="@+id/btnChangeBg" android:layout_width="0dp" android:layout_height="44dp" android:layout_weight="1"
                          android:text="Ganti Background" android:textColor="#FFFFFF" android:textSize="12sp"
                          android:background="@drawable/btn_outline_teal" android:gravity="center"/>
                  </LinearLayout>
              </LinearLayout>
          </ScrollView>""")

          # fragment_rumble.xml
          w(RES + "/layout/fragment_rumble.xml", """<?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#080F18">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="12dp">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:background="@drawable/card_dark" android:orientation="vertical" android:padding="16dp" android:layout_marginBottom="10dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Rumble Idle" android:textColor="#00BFA5" android:textSize="16sp" android:textStyle="bold" android:layout_marginBottom="16dp"/>
                      <CheckBox android:id="@+id/cbEnable" android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Enable Rumble Idle" android:textColor="#FFFFFF" android:textSize="14sp"
                          android:buttonTint="#00BFA5" android:layout_marginBottom="16dp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Start RPM" android:textColor="#CCCCCC" android:textSize="13sp" android:layout_marginBottom="4dp"/>
                      <EditText android:id="@+id/etStartRpm" android:layout_width="match_parent" android:layout_height="48dp"
                          android:inputType="number" android:textColor="#00BFA5" android:textSize="18sp" android:textStyle="bold"
                          android:background="@drawable/input_bg" android:paddingLeft="12dp" android:layout_marginBottom="12dp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Skip setiap N spark (2-8)" android:textColor="#CCCCCC" android:textSize="13sp" android:layout_marginBottom="4dp"/>
                      <EditText android:id="@+id/etSkip" android:layout_width="match_parent" android:layout_height="48dp"
                          android:inputType="number" android:textColor="#00BFA5" android:textSize="18sp" android:textStyle="bold"
                          android:background="@drawable/input_bg" android:paddingLeft="12dp" android:layout_marginBottom="16dp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Beat Pattern (Biru = Spark, Gelap = Skip)" android:textColor="#CCCCCC" android:textSize="13sp" android:layout_marginBottom="8dp"/>
                      <com.ntech.cdi.ui.BeatGridView android:id="@+id/beatGrid" android:layout_width="match_parent" android:layout_height="wrap_content"/>
                      <TextView android:id="@+id/btnSendRumble" android:layout_width="match_parent" android:layout_height="48dp"
                          android:text="Simpan Rumble" android:textColor="#FFFFFF" android:textSize="14sp" android:textStyle="bold"
                          android:background="@drawable/btn_teal" android:gravity="center" android:layout_marginTop="16dp"/>
                  </LinearLayout>
              </LinearLayout>
          </ScrollView>""")

          # values
          w(RES + "/values/strings.xml",
            '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">NTECH CDI Tuner</string></resources>')
          w(RES + "/values/styles.xml",
            '<?xml version="1.0" encoding="utf-8"?><resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar"><item name="android:windowBackground">#080F18</item><item name="colorPrimary">#00BFA5</item><item name="colorPrimaryDark">#0D1925</item><item name="colorAccent">#00BFA5</item></style></resources>')

          # Manifest
          w(B + "/app/src/main/AndroidManifest.xml", """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.ntech.cdi">
              <uses-permission android:name="android.permission.BLUETOOTH"/>
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name" android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:screenOrientation="portrait" android:windowSoftInputMode="adjustResize">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>""")

          # Drawables
          dr = RES + "/drawable"; os.makedirs(dr, exist_ok=True)
          w(dr+"/btn_teal.xml",         '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#00897B"/><corners android:radius="8dp"/></shape>')
          w(dr+"/btn_outline_teal.xml", '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><stroke android:width="1dp" android:color="#00BFA5"/><corners android:radius="8dp"/><solid android:color="#00000000"/></shape>')
          w(dr+"/card_dark.xml",        '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#0D1925"/><corners android:radius="10dp"/></shape>')
          w(dr+"/input_bg.xml",         '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#0A1520"/><stroke android:width="1dp" android:color="#1E3050"/><corners android:radius="6dp"/></shape>')

          # Icons
          def make_icon(sz):
              def ck(n,d): c=n+d; return struct.pack('>I',len(d))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
              cx=cy=sz//2; r=sz//2-2; rows=[]
              for y in range(sz):
                  row=b'\x00'
                  for x in range(sz):
                      dx,dy=x-cx,y-cy; dist=math.sqrt(dx*dx+dy*dy)
                      if dist>r: row+=b'\x08\x0F\x18'
                      elif dist>r-8: row+=b'\x00\xBF\xA5'
                      else:
                          ang=math.atan2(dy,dx); tooth=int((ang+math.pi)/(2*math.pi)*12)
                          if dist>r-18 and tooth%2==0: row+=b'\x00\xBF\xA5'
                          elif dist<r*0.4: row+=b'\x00\xBF\xA5'
                          else: row+=b'\x0D\x19\x25'
                  rows.append(row)
              return b'\x89PNG\r\n\x1a\n'+ck(b'IHDR',struct.pack('>IIBBBBB',sz,sz,8,2,0,0,0))+ck(b'IDAT',zlib.compress(b''.join(rows)))+ck(b'IEND',b'')
          for folder,sz in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
              p=RES+"/"+folder; os.makedirs(p,exist_ok=True); png=make_icon(sz)
              open(p+"/ic_launcher.png",'wb').write(png); open(p+"/ic_launcher_round.png",'wb').write(png)

          print("All XML + assets OK!")
          PYEOF

      - name: Write Gradle files
        run: |
          mkdir -p NtechCDI/app

          cat > NtechCDI/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }
          android {
              compileSdk 34
              namespace 'com.ntech.cdi'
              defaultConfig {
                  applicationId "com.ntech.cdi"
                  minSdk 26
                  targetSdk 34
                  versionCode 3
                  versionName "3.0"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          cat > NtechCDI/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > NtechCDI/settings.gradle << 'EOF'
          rootProject.name = "NtechCDI"
          include ':app'
          EOF

          cat > NtechCDI/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

      - name: Generate Gradle Wrapper
        run: |
          cd NtechCDI
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build APK
        run: |
          cd NtechCDI
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NTECH-CDI-Tuner-v3-APK
          path: NtechCDI/app/build/outputs/apk/debug/app-debug.apk
