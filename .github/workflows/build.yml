name: Build NTECH CDI Tuner APK v3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Write all Kotlin source files
        run: |
          python3 - << 'PYEOF'
          import os

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              open(path, 'w', encoding='utf-8').write(content)

          B   = "NtechCDI"
          PKG = B + "/app/src/main/java/com/ntech/cdi"
          UI  = PKG + "/ui"

          # ── CdiConfig.kt ─────────────────────────────────────
          w(PKG + "/CdiConfig.kt", r"""package com.ntech.cdi

          class CdiConfig {
              val map1 = IntArray(32) { defaultMap1[it] }
              val map2 = IntArray(32) { defaultMap2[it] }
              val map3 = IntArray(32) { defaultMap3[it] }
              var rpmLimiter  = 12000
              var pulserAngle = 63
              var scrPulse    = 1000
              var rumbleRpm   = 0
              var rumbleSkip  = 3
              var activeMap   = 1
              var edge        = 0
              var lastRpm     = 0
              var lastAdvance = 0.0f  // derajat advance aktual = pulserAngle - delay_fraction

              companion object {
                  val defaultMap1 = intArrayOf(0,8,15,20,24,28,30,32,34,34,34,34,34,34,34,34,34,34,34,34,34,32,30,27,23,19,17,15,15,15,10,10)
                  val defaultMap2 = intArrayOf(0,6,12,18,22,26,28,30,32,32,32,32,32,32,32,32,32,32,32,30,28,26,24,22,20,17,15,12,12,12,8,8)
                  val defaultMap3 = intArrayOf(0,5,12,18,24,30,34,36,38,40,40,40,40,40,38,36,34,32,30,28,26,24,22,20,18,15,12,10,10,10,8,8)
                  // RPM per index (step 500 RPM, index 0 = idle ~500)
                  val rpmSteps = intArrayOf(333,667,1000,1333,1667,2000,2333,2667,3000,3333,3667,4000,4333,4667,5000,5333,5667,6000,6333,6667,7000,7333,7667,8000,8333,8667,9000,9333,9667,10000,10333,10667)
                  fun tickToUs(tick: Int) = tick / 2
                  fun usToTick(us: Int)   = us * 2
              }

              fun activeMapArray() = when (activeMap) { 2 -> map2; 3 -> map3; else -> map1 }

              fun getAdvanceForRpm(rpm: Int): Int {
                  val arr = activeMapArray()
                  val idx = ((rpm / 500) - 1).coerceIn(0, 31)
                  return arr[idx]
              }

              // true = config data (dari GET response), false = live/ack
              fun parseLine(line: String): Boolean {
                  return when {
                      line.startsWith("RPM:") -> {
                          lastRpm = line.removePrefix("RPM:").toIntOrNull() ?: lastRpm
                          lastAdvance = getAdvanceForRpm(lastRpm).toFloat()
                          false
                      }
                      line.startsWith("ACT:") -> { activeMap = line.removePrefix("ACT:").toIntOrNull() ?: activeMap; false }
                      line == "OK" || line == "ERR" -> false
                      line.startsWith("LIM:") -> { rpmLimiter  = line.removePrefix("LIM:").toIntOrNull() ?: rpmLimiter; true }
                      line.startsWith("ANG:") -> { pulserAngle = line.removePrefix("ANG:").toIntOrNull() ?: pulserAngle; true }
                      line.startsWith("SCR:") -> { scrPulse    = line.removePrefix("SCR:").toIntOrNull() ?: scrPulse; true }
                      line.startsWith("RBL:") -> { rumbleRpm   = line.removePrefix("RBL:").toIntOrNull() ?: rumbleRpm; true }
                      line.startsWith("RSK:") -> { rumbleSkip  = line.removePrefix("RSK:").toIntOrNull() ?: rumbleSkip; true }
                      line.startsWith("EDG:") -> { edge        = line.removePrefix("EDG:").toIntOrNull() ?: edge; true }
                      line.startsWith("M1:") -> { line.removePrefix("M1:").split(",").forEachIndexed { i, v -> if (i < 32) map1[i] = v.trim().toIntOrNull() ?: map1[i] }; true }
                      line.startsWith("M2:") -> { line.removePrefix("M2:").split(",").forEachIndexed { i, v -> if (i < 32) map2[i] = v.trim().toIntOrNull() ?: map2[i] }; true }
                      line.startsWith("M3:") -> { line.removePrefix("M3:").split(",").forEachIndexed { i, v -> if (i < 32) map3[i] = v.trim().toIntOrNull() ?: map3[i] }; true }
                      else -> false
                  }
              }

              fun buildMapCmd(prefix: String, arr: IntArray) = prefix + ":" + arr.joinToString(",") + "\r\n"
          }
          """)

          # ── MainActivity.kt ───────────────────────────────────
          w(PKG + "/MainActivity.kt", r"""package com.ntech.cdi

          import android.Manifest
          import android.annotation.SuppressLint
          import android.bluetooth.*
          import android.graphics.BitmapFactory
          import android.graphics.drawable.BitmapDrawable
          import android.net.Uri
          import android.os.*
          import android.widget.*
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AlertDialog
          import androidx.appcompat.app.AppCompatActivity
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.ui.*
          import java.io.*
          import java.util.UUID

          class MainActivity : AppCompatActivity() {

              companion object {
                  var btSocket: BluetoothSocket? = null
                  var outStream: OutputStream? = null
                  var inStream:  InputStream?  = null
                  var isConnected = false
                  val config = CdiConfig()
                  private val callbacks = mutableMapOf<String, (String, Boolean) -> Unit>()
                  fun registerCallback(tag: String, cb: (String, Boolean) -> Unit) { callbacks[tag] = cb }
                  fun unregisterCallback(tag: String) { callbacks.remove(tag) }
                  fun dispatch(line: String, isCfg: Boolean) { callbacks.values.forEach { it(line, isCfg) } }
              }

              private lateinit var tvStatus: TextView
              private lateinit var btnConnect: TextView
              private lateinit var tvInfo: TextView
              private lateinit var navMonitor: TextView
              private lateinit var navMap: TextView
              private lateinit var navConfig: TextView
              private lateinit var navRumble: TextView

              private val pickImage = registerForActivityResult(ActivityResultContracts.GetContent()) { uri ->
                  uri?.let {
                      getSharedPreferences("ntech", MODE_PRIVATE).edit().putString("bg_uri", it.toString()).apply()
                      applyBg(it.toString())
                  }
              }
              private val reqBt = registerForActivityResult(ActivityResultContracts.RequestMultiplePermissions()) { p ->
                  if (p.values.all { it }) showBtDialog()
                  else toast("Izin Bluetooth diperlukan")
              }

              override fun onCreate(s: Bundle?) {
                  super.onCreate(s)
                  setContentView(R.layout.activity_main)
                  tvStatus   = findViewById(R.id.tvStatus)
                  btnConnect = findViewById(R.id.btnConnect)
                  tvInfo     = findViewById(R.id.tvInfo)
                  navMonitor = findViewById(R.id.navMonitor)
                  navMap     = findViewById(R.id.navMap)
                  navConfig  = findViewById(R.id.navConfig)
                  navRumble  = findViewById(R.id.navRumble)
                  getSharedPreferences("ntech", MODE_PRIVATE).getString("bg_uri", null)?.let { applyBg(it) }
                  btnConnect.setOnClickListener { if (isConnected) disconnect() else checkBt() }
                  navMonitor.setOnClickListener { showTab(0) }
                  navMap.setOnClickListener     { showTab(1) }
                  navConfig.setOnClickListener  { showTab(2) }
                  navRumble.setOnClickListener  { showTab(3) }
                  showTab(0); updateUI()
              }

              fun applyBg(u: String) {
                  try {
                      val bmp = BitmapFactory.decodeStream(contentResolver.openInputStream(Uri.parse(u)))
                      findViewById<android.widget.FrameLayout>(R.id.fragContainer).background = BitmapDrawable(resources, bmp)
                  } catch (e: Exception) { }
              }
              fun changeBg() = pickImage.launch("image/*")

              private fun showTab(t: Int) {
                  val f: Fragment = when (t) { 0 -> MonitorFragment(); 1 -> MapFragment(); 2 -> ConfigFragment(); else -> RumbleFragment() }
                  supportFragmentManager.beginTransaction().replace(R.id.fragContainer, f).commit()
                  val teal  = 0xFF00BFA5.toInt()
                  val white = 0xFFFFFFFF.toInt()
                  navMonitor.setTextColor(if (t==0) teal else white)
                  navMap.setTextColor(if (t==1) teal else white)
                  navConfig.setTextColor(if (t==2) teal else white)
                  navRumble.setTextColor(if (t==3) teal else white)
              }

              private fun checkBt() {
                  if (Build.VERSION.SDK_INT >= 31)
                      reqBt.launch(arrayOf(Manifest.permission.BLUETOOTH_SCAN, Manifest.permission.BLUETOOTH_CONNECT))
                  else showBtDialog()
              }

              @SuppressLint("MissingPermission")
              private fun showBtDialog() {
                  val ba = BluetoothAdapter.getDefaultAdapter() ?: run { toast("BT tidak tersedia"); return }
                  if (!ba.isEnabled) { toast("Aktifkan Bluetooth"); return }
                  val p = ba.bondedDevices.toList()
                  if (p.isEmpty()) { toast("Tidak ada perangkat"); return }
                  AlertDialog.Builder(this)
                      .setTitle("Pilih HC-05")
                      .setItems(p.map { "${it.name} | ${it.address}" }.toTypedArray()) { _, i -> connectBt(p[i]) }
                      .show()
              }

              @SuppressLint("MissingPermission")
              private fun connectBt(dev: BluetoothDevice) {
                  tvStatus.text = "Menghubungkan..."; tvStatus.setTextColor(0xFFFF9800.toInt())
                  Thread {
                      try {
                          val s = dev.createRfcommSocketToServiceRecord(UUID.fromString("00001101-0000-1000-8000-00805F9B34FB"))
                          s.connect(); btSocket = s; outStream = s.outputStream; inStream = s.inputStream; isConnected = true
                          runOnUiThread { updateUI(dev.name) }; startRead(); sendCmd("GET\r\n")
                      } catch (e: Exception) {
                          isConnected = false
                          runOnUiThread { tvStatus.text = "Gagal"; tvStatus.setTextColor(0xFFFF5252.toInt()); toast(e.message ?: "Error") }
                      }
                  }.start()
              }

              private fun startRead() {
                  Thread {
                      val buf = ByteArray(256); val sb = StringBuilder()
                      while (isConnected) {
                          try {
                              val n = inStream?.read(buf) ?: break
                              if (n > 0) {
                                  sb.append(String(buf, 0, n))
                                  var idx: Int
                                  while (sb.indexOf("\n").also { idx = it } >= 0) {
                                      val line = sb.substring(0, idx).trim(); sb.delete(0, idx + 1)
                                      if (line.isNotEmpty()) { val c = config.parseLine(line); runOnUiThread { dispatch(line, c) } }
                                  }
                              }
                          } catch (e: Exception) { break }
                      }
                  }.start()
              }

              fun sendCmd(cmd: String) { Thread { try { outStream?.write(cmd.toByteArray()) } catch (e: Exception) { } }.start() }

              private fun disconnect() {
                  isConnected = false; try { btSocket?.close() } catch (e: Exception) { }
                  btSocket = null; outStream = null; inStream = null; updateUI()
              }

              private fun updateUI(name: String = "") {
                  if (isConnected) {
                      tvStatus.text = "Terhubung ke CDI"; tvStatus.setTextColor(0xFF00E676.toInt())
                      tvInfo.text = name; btnConnect.text = "Putuskan"
                      btnConnect.setBackgroundColor(0xFFCC3333.toInt())
                  } else {
                      tvStatus.text = "Tidak Terhubung"; tvStatus.setTextColor(0xFFFF5252.toInt())
                      tvInfo.text = ""; btnConnect.text = "Hubungkan"
                      btnConnect.setBackgroundColor(0xFF00BFA5.toInt())
                  }
              }

              fun toast(msg: String) = Toast.makeText(this, msg, Toast.LENGTH_SHORT).show()
          }
          """)

          # ── MonitorFragment.kt ────────────────────────────────
          w(UI + "/MonitorFragment.kt", r"""package com.ntech.cdi.ui

          import android.graphics.*
          import android.os.Bundle
          import android.view.*
          import android.widget.*
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.MainActivity
          import com.ntech.cdi.R
          import kotlin.math.*

          class MonitorFragment : Fragment() {

              private lateinit var gaugeView: GaugeView
              private lateinit var tvRpm: TextView
              private lateinit var tvAdv: TextView
              private lateinit var tvFirmware: TextView
              private lateinit var tvSerial: TextView
              private lateinit var tvActiveMap: TextView
              private lateinit var chartView: RpmChartView
              private val rpmHistory = ArrayDeque<Int>(60)

              override fun onCreateView(inf: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  inf.inflate(R.layout.fragment_monitor, c, false)

              override fun onViewCreated(view: View, s: Bundle?) {
                  gaugeView   = view.findViewById(R.id.gaugeView)
                  tvRpm       = view.findViewById(R.id.tvRpm)
                  tvAdv       = view.findViewById(R.id.tvAdv)
                  tvFirmware  = view.findViewById(R.id.tvFirmware)
                  tvSerial    = view.findViewById(R.id.tvSerial)
                  tvActiveMap = view.findViewById(R.id.tvActiveMap)
                  chartView   = view.findViewById(R.id.chartView)
                  tvFirmware.text  = "V5.7F"
                  tvSerial.text    = "CDI-5TF"
                  updateDisplay()
                  MainActivity.registerCallback("monitor") { _, _ -> activity?.runOnUiThread { updateDisplay() } }
              }

              private fun updateDisplay() {
                  val cfg = MainActivity.config
                  val rpm = cfg.lastRpm
                  val adv = cfg.lastAdvance
                  tvRpm.text = rpm.toString()
                  tvAdv.text = String.format("%.1f°", adv)
                  val mn = when (cfg.activeMap) { 2 -> "Map 2"; 3 -> "Map 3"; else -> "Map 1" }
                  tvActiveMap.text = mn
                  gaugeView.setRpm(rpm, cfg.rpmLimiter)
                  rpmHistory.addLast(rpm)
                  if (rpmHistory.size > 60) rpmHistory.removeFirst()
                  chartView.setData(rpmHistory.toList(), cfg.rpmLimiter)
              }

              override fun onDestroyView() { super.onDestroyView(); MainActivity.unregisterCallback("monitor") }
          }

          // ── Analog Gauge View ─────────────────────────────────
          class GaugeView(context: android.content.Context, attrs: android.util.AttributeSet? = null) : View(context, attrs) {
              private var rpm = 0; private var maxRpm = 12000
              private val paintBg    = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#1A2035"); style = Paint.Style.FILL }
              private val paintArc   = Paint(Paint.ANTI_ALIAS_FLAG).apply { style = Paint.Style.STROKE; strokeWidth = 18f; strokeCap = Paint.Cap.ROUND }
              private val paintTick  = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#CCCCCC"); strokeWidth = 2f }
              private val paintRed   = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#FF3333"); strokeWidth = 2f }
              private val paintNeedle= Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.WHITE; strokeWidth = 4f; strokeCap = Paint.Cap.ROUND }
              private val paintText  = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#888888"); textAlign = Paint.Align.CENTER; textSize = 24f }

              fun setRpm(r: Int, max: Int) { rpm = r; maxRpm = max; invalidate() }

              override fun onDraw(canvas: Canvas) {
                  val w = width.toFloat(); val h = height.toFloat()
                  val cx = w / 2; val cy = h * 0.55f
                  val radius = minOf(w, h) * 0.42f
                  canvas.drawCircle(cx, cy, radius + 10, paintBg)
                  // Arc background
                  val rect = RectF(cx - radius, cy - radius, cx + radius, cy + radius)
                  paintArc.color = Color.parseColor("#1E3050"); paintArc.strokeWidth = 20f
                  canvas.drawArc(rect, 150f, 240f, false, paintArc)
                  // Arc fill (teal to red)
                  val fraction = (rpm.toFloat() / maxRpm).coerceIn(0f, 1f)
                  val sweep = fraction * 240f
                  if (sweep > 0f) {
                      paintArc.color = when {
                          fraction > 0.85f -> Color.parseColor("#FF3333")
                          fraction > 0.7f  -> Color.parseColor("#FF9800")
                          else             -> Color.parseColor("#00BFA5")
                      }
                      canvas.drawArc(rect, 150f, sweep, false, paintArc)
                  }
                  // Ticks
                  val steps = 18
                  for (i in 0..steps) {
                      val angle = Math.toRadians(150.0 + i * (240.0 / steps))
                      val frac  = i.toFloat() / steps
                      val inner = if (i % 3 == 0) radius - 30f else radius - 20f
                      val x1 = (cx + cos(angle) * (radius - 5)).toFloat()
                      val y1 = (cy + sin(angle) * (radius - 5)).toFloat()
                      val x2 = (cx + cos(angle) * inner).toFloat()
                      val y2 = (cy + sin(angle) * inner).toFloat()
                      val p  = if (frac > 0.85f) paintRed else paintTick
                      canvas.drawLine(x1, y1, x2, y2, p)
                      if (i % 3 == 0) {
                          val rpmVal = ((frac * maxRpm) / 1000).toInt()
                          val tx = (cx + cos(angle) * (inner - 20)).toFloat()
                          val ty = (cy + sin(angle) * (inner - 20)).toFloat() + 8f
                          paintText.textSize = radius * 0.12f
                          canvas.drawText(rpmVal.toString(), tx, ty, paintText)
                      }
                  }
                  // Needle
                  val needleAngle = Math.toRadians(150.0 + fraction * 240.0)
                  val nx = (cx + cos(needleAngle) * (radius - 25)).toFloat()
                  val ny = (cy + sin(needleAngle) * (radius - 25)).toFloat()
                  canvas.drawLine(cx, cy, nx, ny, paintNeedle)
                  canvas.drawCircle(cx, cy, 8f, paintNeedle)
              }

              override fun onMeasure(w: Int, h: Int) {
                  val size = MeasureSpec.getSize(w)
                  setMeasuredDimension(size, (size * 0.65f).toInt())
              }
          }

          // ── RPM Chart View ────────────────────────────────────
          class RpmChartView(context: android.content.Context, attrs: android.util.AttributeSet? = null) : View(context, attrs) {
              private var data = listOf<Int>(); private var maxRpm = 12000
              private val paintLine = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#00BFA5"); strokeWidth = 3f; style = Paint.Style.STROKE }
              private val paintFill = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#1A4040"); style = Paint.Style.FILL }
              private val paintGrid = Paint().apply { color = Color.parseColor("#1E3050"); strokeWidth = 1f }

              fun setData(d: List<Int>, max: Int) { data = d; maxRpm = max; invalidate() }

              override fun onDraw(canvas: Canvas) {
                  val w = width.toFloat(); val h = height.toFloat()
                  canvas.drawRect(0f, 0f, w, h, paintFill)
                  if (data.size < 2) return
                  val path = Path(); val fill = Path()
                  val step = w / (data.size - 1)
                  data.forEachIndexed { i, v ->
                      val x = i * step
                      val y = h - (v.toFloat() / maxRpm * h)
                      if (i == 0) { path.moveTo(x, y); fill.moveTo(x, h) } else path.lineTo(x, y)
                      fill.lineTo(x, y)
                  }
                  fill.lineTo(w, h); fill.close()
                  canvas.drawPath(fill, paintFill)
                  canvas.drawPath(path, paintLine)
              }
          }
          """)

          # ── MapFragment.kt ────────────────────────────────────
          w(UI + "/MapFragment.kt", r"""package com.ntech.cdi.ui

          import android.graphics.*
          import android.os.Bundle
          import android.text.*
          import android.view.*
          import android.widget.*
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.CdiConfig
          import com.ntech.cdi.MainActivity
          import com.ntech.cdi.R
          import kotlin.math.*

          class MapFragment : Fragment() {

              private var currentMap = 1
              private var isUpdating = false
              private val cells = Array(3) { arrayOfNulls<EditText>(32) }
              private lateinit var chartView: IgnMapChartView
              private lateinit var tableContainer: LinearLayout
              private lateinit var tvMapTitle: TextView
              private lateinit var spMap: Spinner

              override fun onCreateView(inf: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  inf.inflate(R.layout.fragment_map, c, false)

              override fun onViewCreated(view: View, s: Bundle?) {
                  chartView      = view.findViewById(R.id.ignChart)
                  tableContainer = view.findViewById(R.id.tableContainer)
                  tvMapTitle     = view.findViewById(R.id.tvMapTitle)
                  spMap          = view.findViewById(R.id.spMap)

                  val maps = listOf("Map 1 - Harian", "Map 2 - Touring", "Map 3 - Racing")
                  spMap.adapter = ArrayAdapter(requireContext(), android.R.layout.simple_spinner_dropdown_item, maps)
                  spMap.onItemSelectedListener = object : AdapterView.OnItemSelectedListener {
                      override fun onItemSelected(p: AdapterView<*>?, v: View?, pos: Int, id: Long) {
                          currentMap = pos + 1; refreshChart(); refreshTable()
                      }
                      override fun onNothingSelected(p: AdapterView<*>?) {}
                  }

                  buildTable()
                  refreshChart()

                  view.findViewById<TextView>(R.id.btnSave).setOnClickListener {
                      val cfg = MainActivity.config
                      val arr = when (currentMap) { 2 -> cfg.map2; 3 -> cfg.map3; else -> cfg.map1 }
                      val pfx = when (currentMap) { 2 -> "M2"; 3 -> "M3"; else -> "M1" }
                      (activity as? MainActivity)?.sendCmd(cfg.buildMapCmd(pfx, arr))
                      (activity as? MainActivity)?.sendCmd("ACT:$currentMap\r\n")
                      Toast.makeText(context, "Map $currentMap tersimpan", Toast.LENGTH_SHORT).show()
                      refreshChart()
                  }
                  view.findViewById<TextView>(R.id.btnSaveAll).setOnClickListener {
                      val cfg = MainActivity.config
                      val act = activity as? MainActivity
                      act?.sendCmd(cfg.buildMapCmd("M1", cfg.map1))
                      act?.sendCmd(cfg.buildMapCmd("M2", cfg.map2))
                      act?.sendCmd(cfg.buildMapCmd("M3", cfg.map3))
                      act?.sendCmd("ACT:$currentMap\r\n")
                      Toast.makeText(context, "Semua map tersimpan", Toast.LENGTH_SHORT).show()
                  }

                  MainActivity.registerCallback("map") { _, isCfg -> if (isCfg) activity?.runOnUiThread { refreshChart(); refreshTable() } }
              }

              private fun buildTable() {
                  tableContainer.removeAllViews()
                  val cfg = MainActivity.config
                  // Header row
                  val hRow = LinearLayout(requireContext()).apply {
                      orientation = LinearLayout.HORIZONTAL
                      setBackgroundColor(Color.parseColor("#1A2035"))
                  }
                  val hLabel = TextView(requireContext()).apply {
                      text = ""; layoutParams = LinearLayout.LayoutParams(120, 56)
                      setPadding(8, 0, 8, 0); gravity = Gravity.CENTER
                  }
                  hRow.addView(hLabel)
                  val rpmLabels = listOf("333","667","1000","1333","1667","2000","2333","2667","3000","3333","3667","4000","4333","4667","5000","5333","5667","6000","6333","6667","7000","7333","7667","8000","8333","8667","9000","9333","9667","10000","10333","10667")
                  for (lbl in rpmLabels) {
                      hRow.addView(TextView(requireContext()).apply {
                          text = lbl; layoutParams = LinearLayout.LayoutParams(120, 56)
                          setTextColor(Color.parseColor("#00BFA5")); textSize = 11f
                          setPadding(4, 0, 4, 0); gravity = Gravity.CENTER
                      })
                  }
                  tableContainer.addView(hRow)

                  // Map rows
                  val mapNames = listOf("Map1","Map2","Map3")
                  val mapArrs  = listOf(cfg.map1, cfg.map2, cfg.map3)
                  for (mi in 0..2) {
                      val row = LinearLayout(requireContext()).apply {
                          orientation = LinearLayout.HORIZONTAL
                          setBackgroundColor(if (mi % 2 == 0) Color.parseColor("#0F1925") else Color.parseColor("#111E2E"))
                      }
                      row.addView(TextView(requireContext()).apply {
                          text = mapNames[mi]; layoutParams = LinearLayout.LayoutParams(120, 60)
                          setTextColor(Color.parseColor("#00BFA5")); textSize = 12f; setTypeface(typeface, Typeface.BOLD)
                          setPadding(8, 0, 8, 0); gravity = Gravity.CENTER
                      })
                      for (ci in 0..31) {
                          val idx = ci; val mapIdx = mi
                          val arr = mapArrs[mapIdx]
                          val et = EditText(requireContext()).apply {
                              layoutParams = LinearLayout.LayoutParams(120, 60)
                              inputType = InputType.TYPE_CLASS_NUMBER
                              gravity = Gravity.CENTER; textSize = 13f
                              setTypeface(typeface, Typeface.BOLD)
                              setText(arr[idx].toString())
                              setTextColor(Color.WHITE)
                              setBackgroundColor(Color.TRANSPARENT)
                              setPadding(4, 0, 4, 0)
                              addTextChangedListener(object : TextWatcher {
                                  override fun beforeTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
                                  override fun onTextChanged(s: CharSequence?, a: Int, b: Int, c: Int) {}
                                  override fun afterTextChanged(s: Editable?) {
                                      if (isUpdating) return
                                      val v = s?.toString()?.toIntOrNull() ?: return
                                      if (v in 0..60) arr[idx] = v
                                      if (mapIdx + 1 == currentMap) refreshChart()
                                  }
                              })
                          }
                          cells[mi][ci] = et; row.addView(et)
                      }
                      tableContainer.addView(row)
                  }
              }

              private fun refreshTable() {
                  isUpdating = true
                  val cfg = MainActivity.config
                  val arrs = listOf(cfg.map1, cfg.map2, cfg.map3)
                  for (mi in 0..2) for (ci in 0..31) cells[mi][ci]?.setText(arrs[mi][ci].toString())
                  isUpdating = false
              }

              private fun refreshChart() {
                  val cfg = MainActivity.config
                  val arr = when (currentMap) { 2 -> cfg.map2; 3 -> cfg.map3; else -> cfg.map1 }
                  chartView.setData(arr.toList(), currentMap)
              }

              override fun onDestroyView() { super.onDestroyView(); MainActivity.unregisterCallback("map") }
          }

          // ── Ignition Map Chart ────────────────────────────────
          class IgnMapChartView(context: android.content.Context, attrs: android.util.AttributeSet? = null) : View(context, attrs) {
              private var data = listOf<Int>(); private var mapIdx = 1
              private val paint = Paint(Paint.ANTI_ALIAS_FLAG).apply { strokeWidth = 3f; style = Paint.Style.STROKE }
              private val paintFill = Paint(Paint.ANTI_ALIAS_FLAG).apply { style = Paint.Style.FILL }
              private val paintGrid = Paint().apply { color = Color.parseColor("#1E3050"); strokeWidth = 1f }
              private val paintText = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#888888"); textSize = 24f; textAlign = Paint.Align.RIGHT }
              private val paintDot  = Paint(Paint.ANTI_ALIAS_FLAG).apply { style = Paint.Style.FILL }

              fun setData(d: List<Int>, mi: Int) { data = d; mapIdx = mi; invalidate() }

              override fun onDraw(canvas: Canvas) {
                  val w = width.toFloat(); val h = height.toFloat()
                  canvas.drawColor(Color.parseColor("#0A1520"))
                  if (data.isEmpty()) return
                  val padL = 50f; val padB = 10f; val padT = 20f; val padR = 10f
                  val gw = w - padL - padR; val gh = h - padT - padB
                  // Grid lines
                  for (i in 0..4) {
                      val y = padT + i * gh / 4
                      canvas.drawLine(padL, y, w - padR, y, paintGrid)
                      val lbl = (45 - i * 45 / 4).toString()
                      paintText.textSize = 22f
                      canvas.drawText(lbl, padL - 4, y + 8, paintText)
                  }
                  val color = when (mapIdx) { 2 -> Color.parseColor("#FF9800"); 3 -> Color.parseColor("#FF3333"); else -> Color.parseColor("#00BFA5") }
                  paint.color = color
                  paintFill.color = Color.argb(40, Color.red(color), Color.green(color), Color.blue(color))
                  paintDot.color  = color
                  val step = gw / (data.size - 1)
                  val path = Path(); val fill = Path()
                  data.forEachIndexed { i, v ->
                      val x = padL + i * step
                      val y = padT + gh - (v.toFloat() / 45f * gh)
                      if (i == 0) { path.moveTo(x, y); fill.moveTo(x, padT + gh) } else path.lineTo(x, y)
                      fill.lineTo(x, y)
                      canvas.drawCircle(x, y, 5f, paintDot)
                  }
                  fill.lineTo(padL + (data.size - 1) * step, padT + gh); fill.close()
                  canvas.drawPath(fill, paintFill)
                  canvas.drawPath(path, paint)
              }
          }
          """)

