name: Build NTECH CDI Tuner Final Chart

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create NTECH Project Files
        run: |
          python3 << 'PYEOF'
          import os
          def w(p, c):
              folder = os.path.dirname(p)
              if folder: 
                  os.makedirs(folder, exist_ok=True)
              with open(p, 'w', encoding='utf-8') as f: f.write(c)

          pkg = "app/src/main/java/com/ntech/cdi"
          res = "app/src/main/res"

          # 1. MODEL DATA (CdiConfig.kt)
          w(f"{pkg}/CdiConfig.kt", "package com.ntech.cdi\nclass CdiConfig {\n    var rpm = 0; var limiter = 12000\n    var map1 = IntArray(32) { 15 }\n    fun parse(line: String) {\n        if (line.startsWith(\"RPM:\")) rpm = line.substring(4).trim().toIntOrNull() ?: rpm\n    }\n}")

          # 2. LOGIKA UTAMA (MainActivity.kt)
          w(f"{pkg}/MainActivity.kt", "package com.ntech.cdi\nimport android.os.*\nimport androidx.appcompat.app.AppCompatActivity\nimport com.ntech.cdi.ui.MapFragment\nclass MainActivity : AppCompatActivity() {\n    companion object { val config = CdiConfig() }\n    override fun onCreate(s: Bundle?) {\n        super.onCreate(s); setContentView(R.layout.activity_main)\n        supportFragmentManager.beginTransaction().replace(R.id.fragContainer, MapFragment()).commit()\n    }\n}")

          # 3. KODE GRAFIK (MapFragment.kt)
          w(f"{pkg}/ui/MapFragment.kt", "package com.ntech.cdi.ui\nimport android.graphics.Color\nimport android.os.Bundle\nimport android.view.*\nimport android.widget.*\nimport androidx.fragment.app.Fragment\nimport com.github.mikephil.charting.charts.LineChart\nimport com.github.mikephil.charting.data.*\nimport com.ntech.cdi.*\nclass MapFragment : Fragment() {\n    override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?) = i.inflate(R.layout.fragment_map, c, false)\n    override fun onViewCreated(v: View, s: Bundle?) {\n        val chart = v.findViewById<LineChart>(R.id.chartMap)\n        val entries = ArrayList<Entry>()\n        MainActivity.config.map1.forEachIndexed { i, a -> entries.add(Entry(i.toFloat(), a.toFloat())) }\n        chart.data = LineData(LineDataSet(entries, \"Kurva NTECH\").apply { color = Color.RED })\n        chart.invalidate()\n    }\n}")

          # 4. FIX CONFIG GRADLE (Menghilangkan error backslash)
          w("settings.gradle", "rootProject.name='NtechCDI'\ninclude ':app'")
          w("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          w("build.gradle", "buildscript {\n    repositories { google(); mavenCentral() }\n    dependencies { classpath 'com.android.tools.build:gradle:8.2.0'; classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10' }\n}\nallprojects { repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } } }")
          w("app/build.gradle", "plugins { id 'com.android.application'; id 'kotlin-android' }\nandroid {\n    compileSdk 34\n    namespace 'com.ntech.cdi'\n    defaultConfig { applicationId 'com.ntech.cdi'; minSdk 26; targetSdk 34; versionCode 1; versionName '1.0' }\n}\ndependencies {\n    implementation 'androidx.appcompat:appcompat:1.6.1'\n    implementation 'com.google.android.material:material:1.11.0'\n    implementation 'com.github.PhilJay:MPAndroidChart:v3.1.0'\n}")

          # 5. MANIFEST & LAYOUT
          w("app/src/main/AndroidManifest.xml", "<?xml version='1.0' encoding='utf-8'?>\n<manifest xmlns:android='http://schemas.android.com/apk/res/android' package='com.ntech.cdi'>\n    <application android:label='NTECH CDI' android:theme='@style/Theme.AppCompat.Light.NoActionBar'>\n        <activity android:name='.MainActivity' android:exported='true'>\n            <intent-filter>\n                <action android:name='android.intent.action.MAIN'/>\n                <category android:name='android.intent.category.LAUNCHER'/>\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>")
          w(f"{res}/layout/activity_main.xml", "<?xml version='1.0' encoding='utf-8'?>\n<FrameLayout xmlns:android='http://schemas.android.com/apk/res/android' android:id='@+id/fragContainer' android:layout_width='match_parent' android:layout_height='match_parent' android:background='#000000'/>")
          w(f"{res}/layout/fragment_map.xml", "<?xml version='1.0' encoding='utf-8'?>\n<LinearLayout xmlns:android='http://schemas.android.com/apk/res/android' android:layout_width='match_parent' android:layout_height='match_parent' android:orientation='vertical' android:background='#0D0D0D'>\n    <com.github.mikephil.charting.charts.LineChart android:id='@+id/chartMap' android:layout_width='match_parent' android:layout_height='300dp'/>\n</LinearLayout>")
          PYEOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload NTECH APK
        uses: actions/upload-artifact@v4
        with:
          name: NTECH-CDI-Chart-v5.7F
          path: app/build/outputs/apk/debug/app-debug.apk
