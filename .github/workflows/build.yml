                          MainActivity.config.pulserAngle = v
                          send("ANG:$v\r\n", "Pulser Angle $v°")
                      } else toast("Range: 30-120")
                  }
                  view.findViewById<TextView>(R.id.btnSendLim).setOnClickListener {
                      val v = etLim.text.toString().toIntOrNull()
                      if (v != null && v in 1000..16000) {
                          MainActivity.config.rpmLimiter = v
                          send("LIM:$v\r\n", "Limiter $v RPM")
                      } else toast("Range: 1000-16000")
                  }
                  view.findViewById<TextView>(R.id.btnSendScr).setOnClickListener {
                      val us = etScr.text.toString().toIntOrNull()
                      if (us != null) {
                          val tick = CdiConfig.usToTick(us)
                          if (tick in 200..4000) {
                              MainActivity.config.scrPulse = tick
                              send("SCR:$tick\r\n", "SCR ${us}us")
                          } else toast("Range: 100-2000us")
                      }
                  }
                  view.findViewById<TextView>(R.id.btnSendEdge).setOnClickListener {
                      val e = spEdge.selectedItemPosition
                      MainActivity.config.edge = e
                      send("EDG:$e\r\n", "Edge ${if(e==0)"Falling" else "Rising"}")
                  }
                  view.findViewById<TextView>(R.id.btnGet).setOnClickListener {
                      if (MainActivity.isConnected) { (activity as? MainActivity)?.sendCmd("GET\r\n"); toast("Meminta config...") }
                      else toast("Tidak terhubung")
                  }
                  view.findViewById<TextView>(R.id.btnChangeBg).setOnClickListener {
                      (activity as? MainActivity)?.changeBg()
                  }

                  MainActivity.registerCallback("config") { _, isCfg -> if (isCfg) activity?.runOnUiThread { loadConfig() } }
              }

              private fun loadConfig() {
                  val cfg = MainActivity.config
                  etAngle.setText(cfg.pulserAngle.toString())
                  etLim.setText(cfg.rpmLimiter.toString())
                  etScr.setText(CdiConfig.tickToUs(cfg.scrPulse).toString())
                  spEdge.setSelection(cfg.edge.coerceIn(0, 1))
              }

