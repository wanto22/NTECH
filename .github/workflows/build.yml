name: Build NTECH CDI Tuner Final Chart

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create NTECH Project Files
        run: |
          python3 << 'PYEOF'
          import os
          def w(p, c):
              folder = os.path.dirname(p)
              if folder and not os.path.exists(folder):
                  os.makedirs(folder, exist_ok=True)
              with open(p, 'w', encoding='utf-8') as f:
                  f.write(c)

          pkg = "app/src/main/java/com/ntech/cdi"
          res = "app/src/main/res"

          # 1. MODEL DATA & LOGIKA CDI
          w(f"{pkg}/CdiConfig.kt", """package com.ntech.cdi
          class CdiConfig {
              var map1 = IntArray(32) { 15 }
          }""")

          w(f"{pkg}/MainActivity.kt", """package com.ntech.cdi
          import android.os.*
          import androidx.appcompat.app.AppCompatActivity
          import com.ntech.cdi.ui.MapFragment
          class MainActivity : AppCompatActivity() {
              companion object { val config = CdiConfig() }
              override fun onCreate(s: Bundle?) {
                  super.onCreate(s)
                  setContentView(R.layout.activity_main)
                  supportFragmentManager.beginTransaction().replace(R.id.frag, MapFragment()).commit()
              }
          }""")

          # 2. UI DENGAN GRAFIK (LineChart)
          w(f"{pkg}/ui/MapFragment.kt", """package com.ntech.cdi.ui
          import android.graphics.Color
          import android.os.Bundle
          import android.view.*
          import androidx.fragment.app.Fragment
          import com.github.mikephil.charting.charts.LineChart
          import com.github.mikephil.charting.data.*
          import com.ntech.cdi.*
          import java.util.*
          class MapFragment : Fragment() {
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?) = i.inflate(R.layout.fragment_map, c, false)
              override fun onViewCreated(v: View, s: Bundle?) {
                  val chart = v.findViewById<LineChart>(R.id.chart)
                  val entries = ArrayList<Entry>()
                  MainActivity.config.map1.forEachIndexed { i, a -> entries.add(Entry(i.toFloat(), a.toFloat())) }
                  val set = LineDataSet(entries, "Kurva NTECH").apply { color = Color.RED; setCircleColor(Color.WHITE) }
                  chart.data = LineData(set)
                  chart.setBackgroundColor(Color.BLACK)
                  chart.invalidate()
              }
          }""")

          # 3. KONFIGURASI GRADLE (Dibersihkan dari karakter backslash)
          w("settings.gradle", "rootProject.name='NtechCDI'\ninclude ':app'")
          
          w("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          
          w("build.gradle", """
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0'; classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10' }
          }
          allprojects {
              repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } }
          }""")

          w("app/build.gradle", """
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              compileSdk 34
              namespace 'com.ntech.cdi'
              defaultConfig { applicationId 'com.ntech.cdi'; minSdk 26; targetSdk 34; versionCode 1; versionName '1.0' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'com.github.PhilJay:MPAndroidChart:v3.1.0'
          }""")

          # 4. MANIFEST & LAYOUT
          w("app/src/main/AndroidManifest.xml", """<?xml version='1.0' encoding='utf-8'?>
          <manifest xmlns:android='http://schemas.android.com/apk/res/android' package='com.ntech.cdi'>
              <application android:label='NTECH' android:theme='@style/Theme.AppCompat.Light.NoActionBar'>
                  <activity android:name='.MainActivity' android:exported='true'>
                      <intent-filter><action android:name='android.intent.action.MAIN'/><category android:name='android.intent.category.LAUNCHER'/></intent-filter>
                  </activity>
              </application>
          </manifest>""")
          
          w(f"{res}/layout/activity_main.xml", "<FrameLayout xmlns:android='http://schemas.android.com/apk/res/android' android:id='@+id/frag' android:layout_width='match_parent' android:layout_height='match_parent'/>")
          w(f"{res}/layout/fragment_map.xml", "<LinearLayout xmlns:android='http://schemas.android.com/apk/res/android' android:layout_width='match_parent' android:layout_height='match_parent' android:background='#000' android:orientation='vertical'><com.github.mikephil.charting.charts.LineChart android:id='@+id/chart' android:layout_width='match_parent' android:layout_height='300dp'/></LinearLayout>")
          PYEOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload NTECH APK
        uses: actions/upload-artifact@v4
        with:
          name: NTECH-CDI-Chart-v5.7
          path: app/build/outputs/apk/debug/app-debug.apk
