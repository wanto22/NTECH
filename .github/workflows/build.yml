name: Build NTECH Ultimate OTG-BT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Create Project Files (Bash Method - Anti Error)
        run: |
          mkdir -p app/src/main/java/com/ntech/cdi/ui
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # ── 1. CONFIG GRADLE (GROOVY) ──
          cat > settings.gradle << 'EOF'
          rootProject.name = "NtechCDI"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.ntech.cdi'
              compileSdk 34
              defaultConfig {
                  applicationId "com.ntech.cdi"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "5.7e"
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              // Library untuk OTG Serial
              implementation 'com.github.mik3y:usb-serial-for-android:3.7.0'
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # ── 2. LOGIKA KODE (MainActivity.java) ──
          # Mendukung BT & OTG. Data CDI disimpan permanen di memori.
          cat > app/src/main/java/com/ntech/cdi/MainActivity.java << 'EOF'
          package com.ntech.cdi;
          import android.Manifest; import android.bluetooth.*; import android.content.*;
          import android.hardware.usb.*; import android.os.*;
          import android.widget.*; import androidx.appcompat.app.AppCompatActivity;
          import com.hoho.android.usbserial.driver.*; import com.ntech.cdi.ui.MapFragment;
          import java.io.*; import java.util.*;

          public class MainActivity extends AppCompatActivity {
              // Simpan data permanen (seperti di foto 2)
              public static String currentRpm="0", curLim="12000", curAng="63", curMap="Map 1";
              
              public static BluetoothSocket btSocket;
              public static UsbSerialPort usbPort;
              private static OutputStream out;
              public static boolean isUsb = false, isConnected = false;

              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s); setContentView(R.layout.act_main);
                  // Setup UI navigasi...
                  getSupportFragmentManager().beginTransaction().replace(R.id.frag, new MapFragment()).commit();
                  if (Build.VERSION.SDK_INT >= 31) requestPermissions(new String[]{Manifest.permission.BLUETOOTH_CONNECT}, 1);
              }

              // Fungsi Kirim Universal (BT/OTG)
              public void send(String cmd) {
                  new Thread(() -> {
                      try {
                          if (isUsb && usbPort != null) usbPort.write(cmd.toByteArray(), 1000);
                          else if (!isUsb && out != null) out.write(cmd.toByteArray());
                      } catch (Exception e) {}
                  }).start();
              }

              // Logika Koneksi OTG
              public void connectOtg() {
                  UsbManager manager = (UsbManager) getSystemService(Context.USB_SERVICE);
                  List<UsbSerialDriver> availableDrivers = UsbSerialProber.getDefaultProber().findAllDrivers(manager);
                  if (availableDrivers.isEmpty()) return;
                  UsbSerialDriver driver = availableDrivers.get(0);
                  UsbDeviceConnection connection = manager.openDevice(driver.getDevice());
                  usbPort = driver.getPorts().get(0);
                  try {
                      usbPort.open(connection);
                      usbPort.setParameters(9600, 8, UsbSerialPort.STOPBITS_1, UsbSerialPort.PARITY_NONE);
                      isUsb = true; isConnected = true;
                      send("GET\n"); // Minta data eeprom
                  } catch (IOException e) {}
              }
          }
          EOF

          # ── 3. UI MAP (MapFragment.java) ──
          # Tabel 32 titik. Data tidak hilang saat pindah tab.
          cat > app/src/main/java/com/ntech/cdi/ui/MapFragment.java << 'EOF'
          package com.ntech.cdi.ui;
          import android.os.Bundle; import android.view.*; import android.widget.*;
          import androidx.fragment.app.Fragment; import com.ntech.cdi.*;

          public class MapFragment extends Fragment {
              private EditText[] ets = new EditText[32];
              // Gunakan array statis agar data map tidak reset (Nembak/Nahan fix)
              private static String[] mapData = new String[32]; 

              @Override public View onCreateView(LayoutInflater i, ViewGroup c, Bundle s) {
                  return i.inflate(R.layout.frag_map, c, false);
              }
              @Override public void onViewCreated(View v, Bundle s) {
                  TableLayout tbl = v.findViewById(R.id.tbl);
                  if (mapData[0] == null) { for(int i=0; i<32; i++) mapData[i] = "15"; } // Default
                  
                  for(int i=0; i<32; i++) {
                      TableRow row = new TableRow(getContext());
                      TextView tv = new TextView(getContext());
                      tv.setText(i*500 + " RPM"); tv.setTextColor(0xFFFFFFFF); tv.setPadding(10,5,10,5);
                      
                      EditText et = new EditText(getContext());
                      et.setText(mapData[i]); et.setTextColor(0xFFFFFFFF); et.setInputType(2); // Number
                      ets[i] = et;
                      row.addView(tv); row.addView(et); tbl.addView(row);
                  }
                  
                  v.findViewById(R.id.btnSend).setOnClickListener(view -> {
                      StringBuilder sb = new StringBuilder("M1:");
                      for(int i=0; i<32; i++) {
                          mapData[i] = ets[i].getText().toString(); // Simpan permanen
                          sb.append(mapData[i]).append(i==31?"":",");
                      }
                      sb.append("\n");
                      ((MainActivity)getActivity()).send(sb.toString());
                      Toast.makeText(getContext(), "Map Terkirim & Tersimpan", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          # ── 4. RESOURCES & UI ──
          echo '<resources><style name="Theme.NTECH" parent="Theme.AppCompat.NoActionBar"><item name="android:windowBackground">#090909</item></style></resources>' > app/src/main/res/values/styles.xml
          echo '<resources><string name="app_name">NTECH Tuning OTG</string></resources>' > app/src/main/res/values/strings.xml
          
          # act_main.xml (UI Navigasi mirip foto)
          cat > app/src/main/res/layout/act_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:background="#090909">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="10dp" android:background="#111">
                  <TextView android:id="@+id/tvStatus" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="Disconnected" android:textColor="#F00" android:textStyle="bold"/>
                  <Button android:id="@+id/btnConnect" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Connect" android:backgroundTint="#FF6B00"/>
              </LinearLayout>
              <FrameLayout android:id="@+id/frag" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="55dp" android:orientation="horizontal" android:background="#111" android:gravity="center">
                  <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="Map Table" android:textColor="#FF6B00" android:gravity="center" android:textStyle="bold"/>
              </LinearLayout>
          </LinearLayout>
          EOF

          # frag_map.xml (Tabel 32 titik)
          cat > app/src/main/res/layout/frag_map.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical">
              <Button android:id="@+id/btnSend" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Save Map to CDI" android:backgroundTint="#388E3C" android:layout_margin="10dp"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="wrap_content">
                  <TableLayout android:id="@+id/tbl" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="10dp" android:stretchColumns="1"/>
              </ScrollView>
          </LinearLayout>
          EOF

          # ── 5. MANIFEST (Izin OTG & BT) ──
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.ntech.cdi">
              <uses-permission android:name="android.permission.BLUETOOTH"/><uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/><uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/><uses-permission android:name="android.permission.USB_PERMISSION"/>
              <uses-feature android:name="android.hardware.usb.host" />
              <application android:label="NTECH Tuning" android:theme="@style/Theme.NTECH">
                  <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity>
              </application>
          </manifest>
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build OTG APK
        run: |
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload NTECH APK
        uses: actions/upload-artifact@v4
        with:
          name: NTECH-OTG-v5.7e
          path: app/build/outputs/apk/debug/app-debug.apk
