                  (activity as? MainActivity)?.sendCmd(cmd); toast("$msg tersimpan")
              }
              private fun toast(msg: String) = Toast.makeText(context, msg, Toast.LENGTH_SHORT).show()

              override fun onDestroyView() { super.onDestroyView(); MainActivity.unregisterCallback("config") }
          }
