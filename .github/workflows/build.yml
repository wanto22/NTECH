          cat > NtechCDI/app/build.gradle << 'EOF'
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              compileSdk 34; namespace 'com.ntech.cdi'
              defaultConfig { applicationId "com.ntech.cdi"; minSdk 26; targetSdk 34; versionCode 8; versionName "5.7H" }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF
          cat > NtechCDI/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0'; classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > NtechCDI/settings.gradle << 'EOF'
          rootProject.name = "NtechCDI"
          include ':app'
          EOF
          cat > NtechCDI/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

      - name: Generate Gradle Wrapper
        run: cd NtechCDI && gradle wrapper --gradle-version 8.2 && chmod +x gradlew

      - name: Build APK
        run: cd NtechCDI && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NTECH-CDI-v5.7H-APK
          path: NtechCDI/app/build/outputs/apk/debug/app-debug.apk
