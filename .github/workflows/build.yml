                          android:text="Kirim Edge" android:textColor="#FFFFFF" android:textSize="13sp" android:background="@drawable/btn_orange" android:gravity="center"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:background="@drawable/card_bg" android:orientation="vertical" android:padding="14dp" android:layout_marginBottom="10dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Rumble Idle" android:textColor="#FF6B00" android:textSize="14sp" android:textStyle="bold" android:layout_marginBottom="8dp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Aktif di RPM:" android:textColor="#CCCCCC" android:textSize="12sp" android:layout_marginBottom="4dp"/>
                      <Spinner android:id="@+id/spRpm" android:layout_width="match_parent" android:layout_height="44dp" android:background="@drawable/input_bg" android:paddingLeft="12dp" android:paddingRight="12dp" android:layout_marginBottom="8dp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Intensitas skip:" android:textColor="#CCCCCC" android:textSize="12sp" android:layout_marginBottom="4dp"/>
                      <Spinner android:id="@+id/spSkip" android:layout_width="match_parent" android:layout_height="44dp" android:background="@drawable/input_bg" android:paddingLeft="12dp" android:paddingRight="12dp" android:layout_marginBottom="8dp"/>
                      <TextView android:id="@+id/btnRumble" android:layout_width="match_parent" android:layout_height="44dp"
                          android:text="Kirim Rumble" android:textColor="#FFFFFF" android:textSize="13sp" android:background="@drawable/btn_orange" android:gravity="center"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                      <TextView android:id="@+id/btnGet" android:layout_width="0dp" android:layout_height="44dp" android:layout_weight="1"
                          android:text="Baca Config CDI" android:textColor="#FFFFFF" android:textSize="12sp" android:background="@drawable/btn_outline" android:gravity="center" android:layout_marginRight="6dp"/>
                      <TextView android:id="@+id/btnBg" android:layout_width="0dp" android:layout_height="44dp" android:layout_weight="1"
                          android:text="Ganti Background" android:textColor="#FFFFFF" android:textSize="12sp" android:background="@drawable/btn_purple" android:gravity="center"/>
                  </LinearLayout>
              </LinearLayout>
          </ScrollView>""")

          w(RES + "/values/strings.xml",
            '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">NTECH CDI Tuner</string></resources>')
          w(RES + "/values/styles.xml",
            '<?xml version="1.0" encoding="utf-8"?><resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar"><item name="android:windowBackground">#0D0D0D</item><item name="colorPrimary">#FF6B00</item><item name="colorPrimaryDark">#1A1A2E</item><item name="colorAccent">#FF6B00</item></style></resources>')

          w(B + "/app/src/main/AndroidManifest.xml", """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.ntech.cdi">
              <uses-permission android:name="android.permission.BLUETOOTH"/>
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-feature android:name="android.hardware.usb.host"/>
              <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name" android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:screenOrientation="portrait" android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>""")

          # Drawables + btn_blue untuk USB
          dr = RES + "/drawable"; os.makedirs(dr, exist_ok=True)
          for name, color in [("btn_orange","#FF6B00"),("btn_green","#388E3C"),("btn_red","#C62828"),("btn_purple","#6A1B9A"),("btn_blue","#1565C0")]:
              w(dr+"/"+name+".xml", '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="'+color+'"/><corners android:radius="8dp"/></shape>')
          w(dr+"/card_bg.xml",    '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#1A1A2E"/><corners android:radius="12dp"/></shape>')
          w(dr+"/btn_outline.xml",'<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><stroke android:width="1dp" android:color="#FF6B00"/><corners android:radius="8dp"/><solid android:color="#00000000"/></shape>')
          w(dr+"/input_bg.xml",   '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#0D0D0D"/><stroke android:width="1dp" android:color="#333333"/><corners android:radius="6dp"/></shape>')

          def make_icon(sz):
              def ck(n,d): c=n+d; return struct.pack('>I',len(d))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
              cx=cy=sz//2; r=sz//2-2; rows=[]
              for y in range(sz):
                  row=b'\x00'
                  for x in range(sz):
                      dx,dy=x-cx,y-cy; dist=math.sqrt(dx*dx+dy*dy)
                      if dist>r: row+=b'\x0D\x0D\x0D'
                      elif dist>r-8: row+=b'\xFF\x6B\x00'
                      else:
                          ang=math.atan2(dy,dx); tooth=int((ang+math.pi)/(2*math.pi)*12)
                          if dist>r-18 and tooth%2==0: row+=b'\xFF\x6B\x00'
                          elif dist<r*0.4: row+=b'\xFF\x6B\x00'
                          else: row+=b'\x1A\x1A\x2E'
                  rows.append(row)
              return b'\x89PNG\r\n\x1a\n'+ck(b'IHDR',struct.pack('>IIBBBBB',sz,sz,8,2,0,0,0))+ck(b'IDAT',zlib.compress(b''.join(rows)))+ck(b'IEND',b'')
          for folder,sz in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
              p=RES+"/"+folder; os.makedirs(p,exist_ok=True); png=make_icon(sz)
              open(p+"/ic_launcher.png",'wb').write(png); open(p+"/ic_launcher_round.png",'wb').write(png)

          print("All XML + assets OK!")
          PYEOF

      - name: Write Gradle files
        run: |
          mkdir -p NtechCDI/app

          cat > NtechCDI/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }
          android {
              compileSdk 34
              namespace 'com.ntech.cdi'
              defaultConfig {
                  applicationId "com.ntech.cdi"
                  minSdk 26
                  targetSdk 34
                  versionCode 2
                  versionName "2.0"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'com.google.android.material:material:1.11.0'
              // USB Serial untuk OTG (CH340, CP2102, FTDI)
              implementation 'com.github.mik3y:usb-serial-for-android:3.5.1'
          }
          EOF

          cat > NtechCDI/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF

          cat > NtechCDI/settings.gradle << 'EOF'
          rootProject.name = "NtechCDI"
          include ':app'
          EOF

          cat > NtechCDI/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

      - name: Generate Gradle Wrapper
        run: |
          cd NtechCDI
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build APK
        run: |
          cd NtechCDI
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NTECH-CDI-Tuner-APK-v2
          path: NtechCDI/app/build/outputs/apk/debug/app-debug.apk
