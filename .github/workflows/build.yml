name: Build NTECH CDI Tuner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH
          /opt/gradle-8.2/bin/gradle --version

      - name: Generate all project files
        run: |
          python3 - << 'PYEOF'
          import os, struct, zlib, math

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              open(path, 'w', encoding='utf-8').write(content)

          B   = "NtechCDI"
          PKG = f"{B}/app/src/main/java/com/ntech/cdi"
          UI  = f"{PKG}/ui"
          RES = f"{B}/app/src/main/res"

          # ── CdiConfig.kt ─────────────────────────────────────
          w(f"{PKG}/CdiConfig.kt", """package com.ntech.cdi
          class CdiConfig {
              val map1 = IntArray(32){defaultMap1[it]}
              val map2 = IntArray(32){defaultMap2[it]}
              val map3 = IntArray(32){defaultMap3[it]}
              var rpmLimiter=12000; var pulserAngle=63; var scrPulse=1000
              var rumbleRpm=0; var rumbleSkip=3; var activeMap=1; var edge=0; var lastRpm=0
              companion object {
                  val defaultMap1=intArrayOf(0,8,15,20,24,28,30,32,34,34,34,34,34,34,34,34,34,34,34,34,34,32,30,27,23,19,17,15,15,15,10,10)
                  val defaultMap2=intArrayOf(0,6,12,18,22,26,28,30,32,32,32,32,32,32,32,32,32,32,32,30,28,26,24,22,20,17,15,12,12,12,8,8)
                  val defaultMap3=intArrayOf(0,5,12,18,24,30,34,36,38,40,40,40,40,40,38,36,34,32,30,28,26,24,22,20,18,15,12,10,10,10,8,8)
                  fun rpmLabel(i:Int)=if(i==0)"Idle" else "${i*500} RPM"
                  fun tickToUs(t:Int)=t/2; fun usToTick(u:Int)=u*2
              }
              fun activeMapArray()=when(activeMap){2->map2;3->map3;else->map1}
              fun parseLine(line:String){when{
                  line.startsWith("RPM:")->lastRpm=line.removePrefix("RPM:").toIntOrNull()?:lastRpm
                  line.startsWith("ACT:")->activeMap=line.removePrefix("ACT:").toIntOrNull()?:activeMap
                  line.startsWith("LIM:")->rpmLimiter=line.removePrefix("LIM:").toIntOrNull()?:rpmLimiter
                  line.startsWith("ANG:")->pulserAngle=line.removePrefix("ANG:").toIntOrNull()?:pulserAngle
                  line.startsWith("SCR:")->scrPulse=line.removePrefix("SCR:").toIntOrNull()?:scrPulse
                  line.startsWith("RBL:")->rumbleRpm=line.removePrefix("RBL:").toIntOrNull()?:rumbleRpm
                  line.startsWith("RSK:")->rumbleSkip=line.removePrefix("RSK:").toIntOrNull()?:rumbleSkip
                  line.startsWith("EDG:")->edge=line.removePrefix("EDG:").toIntOrNull()?:edge
                  line.startsWith("M1:")->line.removePrefix("M1:").split(",").forEachIndexed{i,v->if(i<32)map1[i]=v.trim().toIntOrNull()?:map1[i]}
                  line.startsWith("M2:")->line.removePrefix("M2:").split(",").forEachIndexed{i,v->if(i<32)map2[i]=v.trim().toIntOrNull()?:map2[i]}
                  line.startsWith("M3:")->line.removePrefix("M3:").split(",").forEachIndexed{i,v->if(i<32)map3[i]=v.trim().toIntOrNull()?:map3[i]}
              }}
              fun buildMapCmd(prefix:String,arr:IntArray)="$prefix:${arr.joinToString(",")}\r\n"
          }""")

          # ── MainActivity.kt ───────────────────────────────────
          w(f"{PKG}/MainActivity.kt", """package com.ntech.cdi
          import android.Manifest;import android.annotation.SuppressLint
          import android.bluetooth.*;import android.graphics.*;import android.net.Uri
          import android.os.*;import android.view.*;import android.widget.*
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AlertDialog;import androidx.appcompat.app.AppCompatActivity
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.ui.*;import java.io.*;import java.util.*
          class MainActivity:AppCompatActivity(){
              companion object{var socket:BluetoothSocket?=null;var outStream:OutputStream?=null;var inStream:InputStream?=null;var isConnected=false;var onDataReceived:((String)->Unit)?=null;val config=CdiConfig()}
              private lateinit var tvStatus:TextView;private lateinit var btnConnect:TextView;private lateinit var tvInfo:TextView
              private lateinit var navMonitor:TextView;private lateinit var navMap:TextView;private lateinit var navSettings:TextView
              private val pickImage=registerForActivityResult(ActivityResultContracts.GetContent()){uri->uri?.let{getSharedPreferences("ntech",MODE_PRIVATE).edit().putString("bg_uri",it.toString()).apply();applyBg(it.toString());Toast.makeText(this,"Background diubah",Toast.LENGTH_SHORT).show()}}
              private val reqBt=registerForActivityResult(ActivityResultContracts.RequestMultiplePermissions()){p->if(p.values.all{it})showBtDialog() else Toast.makeText(this,"Izin BT diperlukan",Toast.LENGTH_SHORT).show()}
              override fun onCreate(s:Bundle?){super.onCreate(s);setContentView(R.layout.activity_main)
                  tvStatus=findViewById(R.id.tvStatus);btnConnect=findViewById(R.id.btnConnect);tvInfo=findViewById(R.id.tvInfo)
                  navMonitor=findViewById(R.id.navMonitor);navMap=findViewById(R.id.navMap);navSettings=findViewById(R.id.navSettings)
                  getSharedPreferences("ntech",MODE_PRIVATE).getString("bg_uri",null)?.let{applyBg(it)}
                  btnConnect.setOnClickListener{if(isConnected)disconnect() else checkBt()}
                  navMonitor.setOnClickListener{tab(0)};navMap.setOnClickListener{tab(1)};navSettings.setOnClickListener{tab(2)};tab(0);updateUI()}
              fun applyBg(u:String){try{val bmp=BitmapFactory.decodeStream(contentResolver.openInputStream(Uri.parse(u)));findViewById<FrameLayout>(R.id.fragContainer).background=BitmapDrawable(resources,bmp)}catch(e:Exception){}}
              fun changeBg()=pickImage.launch("image/*")
              private fun tab(t:Int){val f:Fragment=when(t){0->MonitorFragment();1->MapFragment();else->SettingsFragment()};supportFragmentManager.beginTransaction().replace(R.id.fragContainer,f).commit();val o=0xFFFF6B00.toInt();val wh=0xFFFFFFFF.toInt();navMonitor.setTextColor(if(t==0)o else wh);navMap.setTextColor(if(t==1)o else wh);navSettings.setTextColor(if(t==2)o else wh)}
              private fun checkBt(){if(Build.VERSION.SDK_INT>=31)reqBt.launch(arrayOf(Manifest.permission.BLUETOOTH_SCAN,Manifest.permission.BLUETOOTH_CONNECT)) else showBtDialog()}
              @SuppressLint("MissingPermission") private fun showBtDialog(){val ba=BluetoothAdapter.getDefaultAdapter()?:run{Toast.makeText(this,"BT tidak tersedia",Toast.LENGTH_SHORT).show();return};if(!ba.isEnabled){Toast.makeText(this,"Aktifkan BT",Toast.LENGTH_SHORT).show();return};val p=ba.bondedDevices.toList();if(p.isEmpty()){Toast.makeText(this,"Tidak ada perangkat",Toast.LENGTH_LONG).show();return};AlertDialog.Builder(this).setTitle("Pilih HC-05").setItems(p.map{"${it.name}|${it.address}"}.toTypedArray()){_,i->connect(p[i])}.show()}
              @SuppressLint("MissingPermission") private fun connect(d:BluetoothDevice){tvStatus.text="Menghubungkan...";tvStatus.setTextColor(0xFFFF9800.toInt());Thread{try{val s=d.createRfcommSocketToServiceRecord(UUID.fromString("00001101-0000-1000-8000-00805F9B34FB"));s.connect();socket=s;outStream=s.outputStream;inStream=s.inputStream;isConnected=true;runOnUiThread{updateUI(d.name)};startRead();sendCmd("GET\r\n")}catch(e:Exception){isConnected=false;runOnUiThread{tvStatus.text="Gagal";tvStatus.setTextColor(0xFFFF3333.toInt());Toast.makeText(this,"${e.message}",Toast.LENGTH_LONG).show()}}}.start()}
              private fun startRead(){Thread{val buf=ByteArray(256);val sb=StringBuilder();while(isConnected){try{val n=inStream?.read(buf)?:break;if(n>0){sb.append(String(buf,0,n));var i:Int;while(sb.indexOf("\n").also{i=it}>=0){val l=sb.substring(0,i).trim();sb.delete(0,i+1);if(l.isNotEmpty()){config.parseLine(l);runOnUiThread{onDataReceived?.invoke(l)}}}}}catch(e:Exception){break}}}.start()}
              fun sendCmd(cmd:String){Thread{try{outStream?.write(cmd.toByteArray())}catch(e:Exception){}}.start()}
              private fun disconnect(){isConnected=false;try{socket?.close()}catch(e:Exception){};socket=null;outStream=null;inStream=null;updateUI()}
              private fun updateUI(name:String=""){if(isConnected){tvStatus.text="Terhubung";tvStatus.setTextColor(0xFF00E676.toInt());tvInfo.text=name;btnConnect.text="Putuskan";btnConnect.setBackgroundColor(0xFFCC3333.toInt())}else{tvStatus.text="Terputus";tvStatus.setTextColor(0xFFFF5252.toInt());tvInfo.text="";btnConnect.text="Hubungkan";btnConnect.setBackgroundColor(0xFFFF6B00.toInt())}}
          }""")

          # ── MonitorFragment.kt ────────────────────────────────
          w(f"{UI}/MonitorFragment.kt", """package com.ntech.cdi.ui
          import android.os.Bundle;import android.view.*;import android.widget.*
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.CdiConfig;import com.ntech.cdi.MainActivity;import com.ntech.cdi.R
          class MonitorFragment:Fragment(){
              private lateinit var tvRpm:TextView;private lateinit var bar:ProgressBar;private lateinit var tvMap:TextView
              private lateinit var tvLim:TextView;private lateinit var tvAng:TextView;private lateinit var tvEdge:TextView
              private lateinit var tvScr:TextView;private lateinit var tvMax:TextView;private var maxRpm=0
              override fun onCreateView(i:LayoutInflater,c:ViewGroup?,s:Bundle?)=i.inflate(R.layout.fragment_monitor,c,false)
              override fun onViewCreated(v:View,s:Bundle?){
                  tvRpm=v.findViewById(R.id.tvRpm);bar=v.findViewById(R.id.rpmBar);tvMap=v.findViewById(R.id.tvMap)
                  tvLim=v.findViewById(R.id.tvLim);tvAng=v.findViewById(R.id.tvAng);tvEdge=v.findViewById(R.id.tvEdge)
                  tvScr=v.findViewById(R.id.tvScr);tvMax=v.findViewById(R.id.tvMax)
                  v.findViewById<TextView>(R.id.btnReset).setOnClickListener{maxRpm=0;tvMax.text="Max: 0 RPM"}
                  v.findViewById<TextView>(R.id.btnRefresh).setOnClickListener{(activity as? MainActivity)?.sendCmd("GET\r\n")}
                  upd();MainActivity.onDataReceived={_->activity?.runOnUiThread{upd()}}
              }
              private fun upd(){val c=MainActivity.config;val rpm=c.lastRpm;if(rpm>maxRpm){maxRpm=rpm;tvMax.text="Max: $maxRpm RPM"};tvRpm.text=rpm.toString();bar.progress=(rpm*100/16000).coerceIn(0,100);tvRpm.setTextColor(when{rpm>=c.rpmLimiter->0xFFFF3333.toInt();rpm>=c.rpmLimiter*0.85->0xFFFF9800.toInt();else->0xFF00E676.toInt()});tvMap.text="Map ${c.activeMap}: ${when(c.activeMap){2->"Touring";3->"Racing";else->"Harian"}}";tvLim.text="Limiter: ${c.rpmLimiter} RPM";tvAng.text="Pulser: ${c.pulserAngle}";tvEdge.text="Edge: ${if(c.edge==0)"Falling" else "Rising"}";tvScr.text="SCR: ${CdiConfig.tickToUs(c.scrPulse)}us"}
              override fun onDestroyView(){super.onDestroyView();MainActivity.onDataReceived=null}
          }""")

          # ── MapFragment.kt ────────────────────────────────────
          w(f"{UI}/MapFragment.kt", """package com.ntech.cdi.ui
          import android.graphics.Color;import android.os.Bundle;import android.text.*;import android.view.*;import android.widget.*
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.CdiConfig;import com.ntech.cdi.MainActivity;import com.ntech.cdi.R
          class MapFragment:Fragment(){
              private val e1=arrayOfNulls<EditText>(32);private val e2=arrayOfNulls<EditText>(32);private val e3=arrayOfNulls<EditText>(32)
              private lateinit var t1:TableLayout;private lateinit var t2:TableLayout;private lateinit var t3:TableLayout
              private lateinit var tab1:TextView;private lateinit var tab2:TextView;private lateinit var tab3:TextView;private var upd=false
              override fun onCreateView(i:LayoutInflater,c:ViewGroup?,s:Bundle?)=i.inflate(R.layout.fragment_map,c,false)
              override fun onViewCreated(v:View,s:Bundle?){
                  t1=v.findViewById(R.id.t1);t2=v.findViewById(R.id.t2);t3=v.findViewById(R.id.t3)
                  tab1=v.findViewById(R.id.tab1);tab2=v.findViewById(R.id.tab2);tab3=v.findViewById(R.id.tab3)
                  val c=MainActivity.config;buildT(t1,e1,c.map1);buildT(t2,e2,c.map2);buildT(t3,e3,c.map3)
                  tab1.setOnClickListener{show(1)};tab2.setOnClickListener{show(2)};tab3.setOnClickListener{show(3)}
                  v.findViewById<TextView>(R.id.btnS1).setOnClickListener{send(1)};v.findViewById<TextView>(R.id.btnS2).setOnClickListener{send(2)}
                  v.findViewById<TextView>(R.id.btnS3).setOnClickListener{send(3)};v.findViewById<TextView>(R.id.btnSA).setOnClickListener{send(1);send(2);send(3);Toast.makeText(context,"Semua terkirim",Toast.LENGTH_SHORT).show()}
                  show(c.activeMap);MainActivity.onDataReceived={_->activity?.runOnUiThread{refresh()}}
              }
              private fun buildT(tbl:TableLayout,ets:Array<EditText?>,arr:IntArray){tbl.removeAllViews();val h=TableRow(requireContext());h.addView(hdr("RPM"));h.addView(hdr("Advance"));tbl.addView(h);for(i in 0 until 32){val row=TableRow(requireContext());val tv=TextView(requireContext()).apply{text=CdiConfig.rpmLabel(i);setPadding(12,8,12,8);textSize=12f;setTextColor(when{i<=6->Color.parseColor("#4CAF50");i<=16->Color.parseColor("#FF9800");else->Color.parseColor("#FF5252")})};val et=EditText(requireContext()).apply{layoutParams=TableRow.LayoutParams(180,ViewGroup.LayoutParams.WRAP_CONTENT);inputType=android.text.InputType.TYPE_CLASS_NUMBER;gravity=android.view.Gravity.CENTER;textSize=14f;setTypeface(typeface,android.graphics.Typeface.BOLD);setText(arr[i].toString());setTextColor(Color.WHITE);setBackgroundResource(android.R.color.transparent);setPadding(6,4,6,4);addTextChangedListener(object:TextWatcher{override fun beforeTextChanged(s:CharSequence?,a:Int,b:Int,c:Int){};override fun onTextChanged(s:CharSequence?,a:Int,b:Int,c:Int){};override fun afterTextChanged(s:Editable?){if(!upd){val v=s.toString().toIntOrNull()?:return;if(v in 0..60)arr[i]=v}}})};ets[i]=et;row.addView(tv);row.addView(et);row.setBackgroundColor(if(i%2==0)Color.parseColor("#1A1A1A") else Color.parseColor("#222222"));tbl.addView(row)}}
              private fun hdr(t:String)=TextView(requireContext()).apply{text=t;setPadding(12,8,12,8);textSize=12f;setTypeface(typeface,android.graphics.Typeface.BOLD);setTextColor(Color.parseColor("#FF6B00"));setBackgroundColor(Color.parseColor("#1A1A2E"))}
              private fun refresh(){upd=true;val c=MainActivity.config;for(i in 0 until 32){e1[i]?.setText(c.map1[i].toString());e2[i]?.setText(c.map2[i].toString());e3[i]?.setText(c.map3[i].toString())};upd=false}
              private fun show(m:Int){t1.visibility=if(m==1)View.VISIBLE else View.GONE;t2.visibility=if(m==2)View.VISIBLE else View.GONE;t3.visibility=if(m==3)View.VISIBLE else View.GONE;val o=Color.parseColor("#FF6B00");val g=Color.parseColor("#888888");tab1.setTextColor(if(m==1)o else g);tab2.setTextColor(if(m==2)o else g);tab3.setTextColor(if(m==3)o else g)}
              private fun send(m:Int){val c=MainActivity.config;val a=when(m){2->c.map2;3->c.map3;else->c.map1};val p=when(m){2->"M2";3->"M3";else->"M1"};(activity as? MainActivity)?.sendCmd(c.buildMapCmd(p,a));(activity as? MainActivity)?.sendCmd("ACT:$m\r\n");Toast.makeText(context,"Map $m terkirim",Toast.LENGTH_SHORT).show()}
              override fun onDestroyView(){super.onDestroyView();MainActivity.onDataReceived=null}
          }""")

          # ── SettingsFragment.kt ───────────────────────────────
          w(f"{UI}/SettingsFragment.kt", """package com.ntech.cdi.ui
          import android.os.Bundle;import android.view.*;import android.widget.*
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.CdiConfig;import com.ntech.cdi.MainActivity;import com.ntech.cdi.R
          class SettingsFragment:Fragment(){
              private lateinit var etLim:EditText;private lateinit var etAng:EditText;private lateinit var etScr:EditText
              private lateinit var rbF:RadioButton;private lateinit var rbR:RadioButton;private lateinit var spRpm:Spinner;private lateinit var spSkip:Spinner
              private val rpmOpts=listOf("OFF","250 RPM","500 RPM","750 RPM","1000 RPM","1200 RPM","1500 RPM","1800 RPM","2000 RPM","2500 RPM","3000 RPM")
              private val rpmVals=listOf(0,250,500,750,1000,1200,1500,1800,2000,2500,3000)
              private val skipOpts=listOf("2 spark - Kasar","3 spark","4 spark","5 spark","6 spark","7 spark","8 spark - Halus")
              private val skipVals=listOf(2,3,4,5,6,7,8)
              override fun onCreateView(i:LayoutInflater,c:ViewGroup?,s:Bundle?)=i.inflate(R.layout.fragment_settings,c,false)
              override fun onViewCreated(v:View,s:Bundle?){
                  etLim=v.findViewById(R.id.etLim);etAng=v.findViewById(R.id.etAng);etScr=v.findViewById(R.id.etScr)
                  rbF=v.findViewById(R.id.rbF);rbR=v.findViewById(R.id.rbR);spRpm=v.findViewById(R.id.spRpm);spSkip=v.findViewById(R.id.spSkip)
                  spRpm.adapter=ArrayAdapter(requireContext(),android.R.layout.simple_spinner_dropdown_item,rpmOpts)
                  spSkip.adapter=ArrayAdapter(requireContext(),android.R.layout.simple_spinner_dropdown_item,skipOpts)
                  load()
                  v.findViewById<TextView>(R.id.btnLim).setOnClickListener{val x=etLim.text.toString().toIntOrNull()?:return@setOnClickListener;if(x in 1000..16000)go("LIM:$x\r\n","Limiter $x RPM") else t("1000-16000")}
                  v.findViewById<TextView>(R.id.btnAng).setOnClickListener{val x=etAng.text.toString().toIntOrNull()?:return@setOnClickListener;if(x in 30..120)go("ANG:$x\r\n","Angle $x") else t("30-120")}
                  v.findViewById<TextView>(R.id.btnScr).setOnClickListener{val us=etScr.text.toString().toIntOrNull()?:return@setOnClickListener;val tk=CdiConfig.usToTick(us);if(tk in 200..4000)go("SCR:$tk\r\n","SCR ${us}us") else t("100-2000us")}
                  v.findViewById<TextView>(R.id.btnEdge).setOnClickListener{val e=if(rbF.isChecked)0 else 1;go("EDG:$e\r\n","Edge ${if(e==0)"Falling" else "Rising"}")}
                  v.findViewById<TextView>(R.id.btnRumble).setOnClickListener{val rpm=rpmVals[spRpm.selectedItemPosition];val skip=skipVals[spSkip.selectedItemPosition];(activity as? MainActivity)?.sendCmd("RBL:$rpm\r\n");(activity as? MainActivity)?.sendCmd("RSK:$skip\r\n");t("Rumble OK tersimpan")}
                  v.findViewById<TextView>(R.id.btnGet).setOnClickListener{(activity as? MainActivity)?.sendCmd("GET\r\n");t("Meminta config...")}
                  v.findViewById<TextView>(R.id.btnBg).setOnClickListener{(activity as? MainActivity)?.changeBg()}
                  MainActivity.onDataReceived={_->activity?.runOnUiThread{load()}}
              }
              private fun load(){val c=MainActivity.config;etLim.setText(c.rpmLimiter.toString());etAng.setText(c.pulserAngle.toString());etScr.setText(CdiConfig.tickToUs(c.scrPulse).toString());if(c.edge==0)rbF.isChecked=true else rbR.isChecked=true;spRpm.setSelection(rpmVals.indexOf(c.rumbleRpm).takeIf{it>=0}?:0);spSkip.setSelection(skipVals.indexOf(c.rumbleSkip).takeIf{it>=0}?:1)}
              private fun go(cmd:String,msg:String){(activity as? MainActivity)?.sendCmd(cmd);t("$msg tersimpan")}
              private fun t(msg:String)=Toast.makeText(context,msg,Toast.LENGTH_SHORT).show()
              override fun onDestroyView(){super.onDestroyView();MainActivity.onDataReceived=null}
          }""")

          # ── Layouts ───────────────────────────────────────────
          w(f"{RES}/layout/activity_main.xml", """<?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#0D0D0D">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:background="#1A1A2E" android:orientation="horizontal" android:padding="10dp" android:gravity="center_vertical">
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical">
                      <TextView android:id="@+id/tvStatus" android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Terputus" android:textColor="#FF5252" android:textSize="13sp" android:textStyle="bold"/>
                      <TextView android:id="@+id/tvInfo" android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="" android:textColor="#888888" android:textSize="11sp"/>
                  </LinearLayout>
                  <TextView android:id="@+id/btnConnect" android:layout_width="wrap_content" android:layout_height="36dp"
                      android:text="Hubungkan" android:textColor="#FFFFFF" android:textSize="12sp" android:textStyle="bold"
                      android:background="@drawable/btn_orange" android:paddingLeft="16dp" android:paddingRight="16dp" android:gravity="center"/>
              </LinearLayout>
              <FrameLayout android:id="@+id/fragContainer" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="52dp" android:background="#1A1A2E" android:orientation="horizontal">
                  <TextView android:id="@+id/navMonitor" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"
                      android:text="Monitor" android:textColor="#FF6B00" android:textSize="12sp" android:textStyle="bold" android:gravity="center"/>
                  <View android:layout_width="1dp" android:layout_height="match_parent" android:background="#333333"/>
                  <TextView android:id="@+id/navMap" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"
                      android:text="Advance Map" android:textColor="#FFFFFF" android:textSize="11sp" android:gravity="center"/>
                  <View android:layout_width="1dp" android:layout_height="match_parent" android:background="#333333"/>
                  <TextView android:id="@+id/navSettings" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"
                      android:text="Seting" android:textColor="#FFFFFF" android:textSize="12sp" android:gravity="center"/>
              </LinearLayout>
          </LinearLayout>""")

          w(f"{RES}/layout/fragment_monitor.xml", """<?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0D0D0D">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="12dp">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:background="@drawable/card_bg" android:orientation="vertical" android:padding="20dp" android:gravity="center" android:layout_marginBottom="10dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="R P M" android:textColor="#888888" android:textSize="14sp"/>
                      <TextView android:id="@+id/tvRpm" android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="0" android:textColor="#00E676" android:textSize="80sp" android:textStyle="bold"/>
                      <ProgressBar android:id="@+id/rpmBar" style="?android:attr/progressBarStyleHorizontal"
                          android:layout_width="match_parent" android:layout_height="12dp" android:max="100"
                          android:progressTint="#00E676" android:progressBackgroundTint="#333333"/>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="8dp">
                          <TextView android:id="@+id/tvMax" android:layout_width="0dp" android:layout_height="wrap_content"
