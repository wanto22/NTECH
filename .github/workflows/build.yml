          import android.graphics.*
          import android.os.Bundle
          import android.view.*
          import android.widget.*
          import androidx.fragment.app.Fragment
          import com.ntech.cdi.MainActivity
          import com.ntech.cdi.R

          class RumbleFragment : Fragment() {

              private lateinit var cbEnable: CheckBox
              private lateinit var etStartRpm: EditText
              private lateinit var etSkip: EditText
              private lateinit var beatGrid: BeatGridView

              override fun onCreateView(inf: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  inf.inflate(R.layout.fragment_rumble, c, false)

              override fun onViewCreated(view: View, s: Bundle?) {
                  cbEnable  = view.findViewById(R.id.cbEnable)
                  etStartRpm= view.findViewById(R.id.etStartRpm)
                  etSkip    = view.findViewById(R.id.etSkip)
                  beatGrid  = view.findViewById(R.id.beatGrid)

                  val cfg = MainActivity.config
                  cbEnable.isChecked = cfg.rumbleRpm > 0
                  etStartRpm.setText(if (cfg.rumbleRpm > 0) cfg.rumbleRpm.toString() else "1500")
                  etSkip.setText(cfg.rumbleSkip.toString())

                  view.findViewById<TextView>(R.id.btnSendRumble).setOnClickListener {
                      if (!cbEnable.isChecked) {
                          MainActivity.config.rumbleRpm = 0
                          (activity as? MainActivity)?.sendCmd("RBL:0\r\n")
                          toast("Rumble dimatikan")
                          return@setOnClickListener
                      }
                      val rpm  = etStartRpm.text.toString().toIntOrNull() ?: 1500
                      val skip = etSkip.text.toString().toIntOrNull()?.coerceIn(2, 8) ?: 3
                      if (rpm !in 250..3000) { toast("Start RPM: 250-3000"); return@setOnClickListener }
                      MainActivity.config.rumbleRpm  = rpm
                      MainActivity.config.rumbleSkip = skip
                      val act = activity as? MainActivity
                      act?.sendCmd("RBL:$rpm\r\n")
                      act?.sendCmd("RSK:$skip\r\n")
                      toast("Rumble Idle tersimpan")
                  }
              }

              private fun toast(msg: String) = Toast.makeText(context, msg, Toast.LENGTH_SHORT).show()
              override fun onDestroyView() { super.onDestroyView() }
          }

          // ── Beat Grid View (visual tap grid) ──────────────────
          class BeatGridView(context: android.content.Context, attrs: android.util.AttributeSet? = null) : View(context, attrs) {
              private val cols  = 4
              private val rows  = 7
              private val total = cols * rows
              private val active = BooleanArray(total) { it % 3 != 0 }
              private val paintOn  = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#00D4FF"); style = Paint.Style.FILL }
              private val paintOff = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#0D1E2E"); style = Paint.Style.FILL }
              private val paintNum = Paint(Paint.ANTI_ALIAS_FLAG).apply { color = Color.parseColor("#336677"); textAlign = Paint.Align.RIGHT; textSize = 24f }

              init {
                  setOnTouchListener { _, ev ->
                      if (ev.action == android.view.MotionEvent.ACTION_DOWN) {
                          val cw = width.toFloat() / cols
                          val ch = height.toFloat() / rows
                          val col = (ev.x / cw).toInt().coerceIn(0, cols - 1)
                          val row = (ev.y / ch).toInt().coerceIn(0, rows - 1)
                          val idx = row * cols + col
                          if (idx < total) { active[idx] = !active[idx]; invalidate() }
                      }
                      true
                  }
              }

              override fun onDraw(canvas: Canvas) {
                  val cw = width.toFloat() / cols
                  val ch = height.toFloat() / rows
                  for (i in 0 until total) {
                      val col = i % cols; val row = i / cols
                      val left = col * cw + 4f; val top = row * ch + 4f
                      val right = left + cw - 8f; val bot = top + ch - 8f
                      val p = if (active[i]) paintOn else paintOff
                      canvas.drawRoundRect(left, top, right, bot, 12f, 12f, p)
                      paintNum.textSize = ch * 0.35f
                      canvas.drawText("${i+1}", right - 4f, bot - 4f, paintNum)
                  }
              }

              override fun onMeasure(w: Int, h: Int) {
                  val width = MeasureSpec.getSize(w)
                  setMeasuredDimension(width, (width * 1.5f).toInt())
              }
          }
          """)

